<style>
    :root {
    /* ── Navy backgrounds ── */
    --navy-deep:   #0B1C2E;
    --navy:        #0F2035;
    --navy-mid:    #1C3348;
    --navy-light:  #1E2E3E;
    --navy-border: rgba(255,255,255,0.08);
    --navy-border2: rgba(255,255,255,0.13);  /* alias for inputs/borders */
    --rose-light:   #F4C0D1;                 /* alias — same as --rose */
    --sky-blue-mid:     rgba(91,158,201,0.35);   /* alias — same as sky-blue-mid */

    /* ── Sky blue — structural/titles/links ── */
    --sky-blue:        #5B9EC9;
    --sky-blue-light:  #7ABFE0;
    --sky-blue-pale:   rgba(91,158,201,0.12);
    --sky-blue-mid:    rgba(91,158,201,0.35);

    /* ── Rose — nav, labels, eyebrows, Healthtech card ── */
    --rose:        #F4C0D1;   /* primary visible rose — all text/labels */
    --rose-deep:   #C4607A;   /* deep rose — fills, buttons, card borders */
    --rose-pale:   rgba(196,96,122,0.10);
    --rose-border: rgba(244,192,209,0.35);

    /* ── Jade — nav accent (tabs, brand, portfolio link) ── */
    --jade:        #6FCF97;   /* primary visible jade — nav text/labels */
    --jade-deep:   #2F9E6E;   /* deep jade — active borders / underline */
    --jade-pale:   rgba(47,158,110,0.10);
    --jade-border: rgba(111,207,151,0.35);

    /* ── Teal — accent card ── */
    --teal:        #2AB5A0;
    --teal-light:  #7ADDD0;
    --teal-pale:   rgba(42,181,160,0.10);
    --teal-border: rgba(42,181,160,0.30);
    --teal-bg:     rgba(42,181,160,0.10);
    --teal-dim:    rgba(42,181,160,0.35);

    /* ── Gold — Claude/Analyze JD only ── */
    --gold:        #C98A0E;
    --gold-pale:   rgba(201,138,14,0.10);
    --gold-border: rgba(201,138,14,0.35);

    /* ── Semantic ── */
    --green:     #2A9B7A; --green-bg: rgba(42,155,122,0.12); --green-dim: rgba(42,155,122,0.35);
    --red:       #C4607A; --red-bg:   rgba(196,96,122,0.12);
    --blue:      #4A9FD4; --blue-bg:  rgba(74,159,212,0.12);
    --purple:    #9B72CC; --purple-bg:rgba(155,114,204,0.12);
    --amber:     #C98A0E; --amber-dim:rgba(201,138,14,0.4); --amber-bg: rgba(201,138,14,0.12);
    --brd:       rgba(255,255,255,0.08); --brd2: rgba(255,255,255,0.14);

    /* ── Stage card backgrounds ── */
    --card-saved:              rgba(42,181,160,0.09);
    --card-applied:            rgba(74,159,212,0.10);
    --card-coffee:             rgba(42,155,122,0.10);
    --card-screen:             rgba(201,138,14,0.09);
    --card-interview:          rgba(201,138,14,0.11);
    --card-offer:              rgba(42,155,122,0.10);
    --card-rejected:           rgba(196,96,122,0.10);
    --card-ghosted:            rgba(155,114,204,0.08);
    --card-default:            var(--navy-light);

    /* ── Surfaces ── */
    --surf:  var(--navy-light);
    --surf2: var(--navy-light);

    /* ── Text ── */
    --tx:    #E8F1F8;
    --muted: #8BB8D4;
    --faint: #4A7A96;

    /* ── Typography ── */
    --serif: 'DM Serif Display', Georgia, serif;
    --sans:  'Avenir Next', 'Avenir', system-ui, sans-serif;
    --mono:  'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* Deep navy floods the full viewport */
  body {
    background: var(--navy-deep);
    color: var(--tx);
    font-family: 'Avenir Next', 'Avenir', system-ui, sans-serif;
    font-size: 13px;
    line-height: 1.5;
  }
  a { color: var(--sky-blue); }

  input, textarea, select, button {
    font-family: 'Avenir Next', 'Avenir', system-ui, sans-serif;
    font-size: 12px;
  }
  input, textarea, select {
    background: rgba(255,255,255,0.06);
    color: var(--tx);
    border: 1px solid var(--navy-border2);
    border-radius: 6px;
    padding: 7px 11px;
    outline: none;
    width: 100%;
  }
  input::placeholder, textarea::placeholder { color: var(--faint); }
  textarea { resize: vertical; }
  select { cursor: pointer; }
  button {
    cursor: pointer; border-radius: 6px;
    border: 1px solid var(--navy-border2);
    background: rgba(255,255,255,0.06);
    color: var(--tx);
    padding: 6px 14px;
    transition: all .15s;
    letter-spacing: .01em;
  }
  button:hover:not(:disabled) { background: rgba(91,158,201,0.15); border-color: var(--sky-blue-mid); }
  button:disabled { opacity: .35; cursor: not-allowed; }
  button.amber { background: var(--rose-deep); color: #fff; border-color: var(--rose-deep); font-weight: 500; }
  button.amber:hover:not(:disabled) { background: #A84E65; border-color: #A84E65; }
  button.ghost { color: var(--faint); border-color: transparent; background: transparent; }
  button.danger { color: var(--rose-light); border-color: var(--rose-border); background: var(--rose-pale); }
  button.full { width: 100%; padding: 9px 0; font-size: 13px; }

  #nav {
    border-bottom: 1px solid rgba(255,255,255,0.07);
    height: 52px;
    display: flex;
    align-items: stretch;
    justify-content: space-between;
    padding: 0 24px;
    position: sticky;
    top: 0;
    background: var(--navy);
    z-index: 100;
    gap: 12px;
  }
  #nav .brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; align-self: center; }
  #nav .brand .logo {
    width: 28px; height: 28px; border-radius: 7px;
    background: rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  #nav .brand-name { font-size: 17px; font-weight: 600; color: #E8F1F8; letter-spacing: -.2px; }
  #nav .brand-year { font-size: 10px; color: rgba(111,207,151,0.45); letter-spacing: .06em; margin-left: 2px; }

  #nav .portfolio-link {
    font-size: 10px; letter-spacing: .07em; text-transform: uppercase;
    color: var(--jade); text-decoration: none;
    border: 1px solid var(--jade-border);
    padding: 4px 10px; border-radius: 5px;
    white-space: nowrap; transition: all .15s; flex-shrink: 0; align-self: center;
  }
  #nav .portfolio-link:hover { background: var(--jade-pale); }

  #nav .tabs { display: flex; gap: 1px; flex-wrap: nowrap; overflow: visible; align-items: stretch; min-width: 0; }
  #nav .tabs button {
    font-size: 11px; padding: 0 13px;
    background: transparent;
    border: none; border-bottom: 2px solid transparent;
    color: rgba(111,207,151,0.55);
    white-space: nowrap; height: 52px;
    transition: color .15s, border-color .15s, background .15s;
    letter-spacing: .01em;
  }
  #nav .tabs button:hover:not(:disabled) {
    color: var(--jade);
    background: rgba(111,207,151,0.05);
    border-bottom-color: rgba(111,207,151,0.30);
  }
  #nav .tabs button.active {
    color: var(--jade);
    border: 1px solid rgba(111,207,151,0.40);
    border-bottom: 2px solid var(--jade-deep);
    background: rgba(111,207,151,0.07);
    font-weight: 600;
    border-radius: 4px 4px 0 0;
  }
  #nav .tabs button.active:hover:not(:disabled) {
    background: rgba(111,207,151,0.11);
  }
  #sync-status { font-size: 10px; color: rgba(184,212,232,0.55); letter-spacing: .03em; padding: 0 6px; white-space: nowrap; }
  #nav-version { font-size: 9px; font-family: var(--mono); color: rgba(184,212,232,0.40); letter-spacing: .06em; padding: 1px 6px; border: 0.5px solid rgba(184,212,232,0.18); border-radius: 5px; white-space: nowrap; }

  /* ── MAIN — the "window in a window" content well ── */
  #main {
    max-width: 868px;
    margin: 24px auto;
    padding: 28px 28px;
    background: var(--navy-mid);
    border-radius: 14px;
    border: 1px solid rgba(91,160,210,0.14);
    box-shadow: 0 4px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .sec-head { margin-bottom: 24px; }
  .sec-eyebrow { font-size: 10px; color: var(--rose); letter-spacing: .12em; text-transform: uppercase; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .sec-eyebrow::before { content: ''; display: inline-block; width: 16px; height: 1px; background: var(--rose-deep); }
  .sec-head h1 { font-family: 'DM Serif Display', Georgia, serif; font-size: 28px; font-style: normal; font-weight: 400; color: #E8F1F8; letter-spacing: -.01em; line-height: 1.1; margin-bottom: 5px; }
  .sec-head h1 em { font-style: italic; color: var(--rose); font-weight: 400; }
  .sec-head .bar { width: 28px; height: 2px; background: var(--rose-deep); border-radius: 1px; margin-top: 8px; }

  /* CARD */
  .card { background: var(--navy-light); border: 1px solid var(--navy-border); border-radius: 10px; padding: 1rem 1.25rem; animation: fadeIn .2s ease; margin-bottom: 10px; }
  .card:last-child { margin-bottom: 0; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px) } to { opacity:1; transform:none } }
  @keyframes spin { to { transform: rotate(360deg) } }

  /* GRID */
  .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* LABEL */
  .lbl { font-size: 11px; color: var(--muted); letter-spacing: .05em; text-transform: uppercase; margin-bottom: 4px; font-weight: 500; }

  /* MINI TIMER WIDGET */
  .mini-timer-widget {
    display:none;flex-direction:row;align-items:center;gap:8px;
    background:rgba(201,138,14,0.10);border:1px solid rgba(201,138,14,0.28);
    border-radius:8px;padding:6px 12px;font-size:11px;
    position:absolute;top:0;right:0;
  }
  .mini-dot { width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--amber);transition:background .3s; }
  .mini-cd  { font-family:var(--mono);font-size:13px;font-weight:500;color:var(--tx);letter-spacing:.03em; }
  .mini-task{ color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
  .mini-timer-btn { font-size:10px;color:var(--faint);background:none;border:none;padding:0;cursor:pointer;text-decoration:underline; }
  .badge { display: inline-block; padding: 3px 9px; border-radius: 12px; font-size: 11px; letter-spacing: .02em; white-space: nowrap; font-weight: 500; border: 1px solid transparent; }
  .badge.amber { background: var(--amber-bg); color: #E8C97A; border-color: var(--gold-border); }
  .badge.green { background: var(--green-bg); color: #6DDBB8; border-color: var(--green-dim); }
  .badge.red   { background: var(--red-bg);   color: #E8907A;  border-color: var(--rose-border); }
  .badge.blue  { background: var(--blue-bg);  color: var(--sky-blue); border-color: rgba(74,159,212,0.4); }
  .badge.purple{ background: var(--purple-bg);color: #C4A8E8;  border-color: rgba(155,114,204,0.4); }
  .badge.teal  { background: var(--teal-bg);  color: var(--teal); border-color: var(--teal-dim); }

  /* PILL */
  .pill { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 8px; background: rgba(91,158,201,0.10); border: 1px solid var(--navy-border); color: var(--muted); margin: 2px; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: middle; }

  /* TAGS */
  .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .tag { font-size: 11px; padding: 4px 11px; border-radius: 20px; border: 1px solid var(--navy-border); background: rgba(255,255,255,0.04); color: var(--muted); }
  .tag:hover { border-color: var(--sky-blue-mid); color: var(--sky-blue); }
  .tag.on { background: var(--sky-blue-pale); color: var(--sky-blue-light); border-color: var(--sky-blue-mid); font-weight: 500; }

  /* SPINNER */
  .spin { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--navy-border2); border-top-color: var(--sky-blue); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }

  /* ROW */
  .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  /* EMPTY */
  .empty { text-align: center; padding: 3rem 0; color: var(--faint); }

  /* FEEDBACK / MSG BOXES */
  .fb-box { margin-top: 10px; padding: 10px 12px; border-radius: 8px; background: var(--sky-blue-pale); border: 1px solid rgba(91,158,201,0.25); font-size: 12px; color: var(--muted); line-height: 1.7; white-space: pre-wrap; }
  .fb-box .fb-lbl { color: var(--sky-blue-light); font-size: 11px; font-weight: 600; display: block; margin-bottom: 4px; }
  .msg-box { padding: 10px 12px; border-radius: 8px; background: var(--gold-pale); border: 1px solid var(--gold-border); font-size: 12px; color: var(--tx); line-height: 1.7; white-space: pre-wrap; }

  /* ERROR */
  .err { color: #E8907A; font-size: 12px; padding: 10px 12px; border-radius: 6px; background: var(--rose-pale); border: 1px solid var(--rose-border); margin-bottom: 10px; }

  /* POMODORO */
  #pom-svg { transform: rotate(-90deg); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--navy-deep); }
  ::-webkit-scrollbar-thumb { background: rgba(91,160,210,0.25); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(91,160,210,0.45); }

  /* PROFILE PANEL */
  #profile-panel {
    position: fixed; top: 0; right: -620px; width: 600px; height: 100vh;
    background: var(--navy-mid); border-left: 1px solid var(--navy-border2);
    z-index: 1000; transition: right .3s ease; overflow-y: auto;
    display: flex; flex-direction: column; box-shadow: -4px 0 24px rgba(0,0,0,0.5);
  }
  #profile-panel.open { right: 0; }
  #profile-overlay { display: none; position: fixed; inset: 0; background: rgba(6,14,22,.55); z-index: 999; }
  #profile-overlay.open { display: block; }
  .profile-header { padding: 16px 20px; border-bottom: 1px solid var(--navy-border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--navy-mid); z-index: 1; }
  .profile-body { padding: 20px; flex: 1; }
  .profile-section-head { font-size: 11px; color: var(--sky-blue-light); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; font-weight: 600; margin-top: 16px; }
  .profile-body p { font-size: 12px; color: var(--muted); line-height: 1.7; }
  .profile-streaming { font-size: 12px; color: var(--muted); line-height: 1.8; white-space: pre-wrap; }
  .profile-loading { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 12px; padding: 20px 0; }

  /* SETTINGS */
  #settings-screen { max-width: 500px; margin: 0 auto; }

  /* APP CARD ACTION ROW */
  .app-card-actions select { max-width: 140px; padding: 0 11px; height: 33px; box-sizing: border-box; align-self: center; }
  .app-card-actions button { height: 33px; box-sizing: border-box; padding-top: 0; padding-bottom: 0; }

  /* STAGE FILTERS */
  .stage-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }

  /* ── v18: AUTH / LOGIN SCREEN ── */
  #auth-screen {
    position: fixed; inset: 0; background: var(--navy-deep);
    z-index: 9999; display: flex; align-items: center; justify-content: center;
    padding: 20px;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(91,158,201,0.06) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(196,96,122,0.06) 0%, transparent 50%);
  }
  #auth-screen.hidden { display: none; }
  .auth-card {
    width: 100%; max-width: 400px;
    background: var(--navy-mid);
    border: 1px solid rgba(91,160,210,0.20);
    border-radius: 16px;
    padding: 36px 32px 30px;
    box-shadow: 0 16px 64px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.05);
    animation: authIn .35s cubic-bezier(.22,1,.36,1);
  }
  @keyframes authIn { from { opacity:0; transform:translateY(16px) scale(.97) } to { opacity:1; transform:none } }
  .auth-logo-row { display:flex; align-items:center; gap:10px; margin-bottom:28px; }
  .auth-logo { width:36px; height:36px; border-radius:9px; background:rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center; }
  .auth-brand { font-size:20px; font-weight:600; color:#E8F1F8; letter-spacing:-.3px; }
  .auth-brand-yr { font-size:11px; color:rgba(244,192,209,0.45); letter-spacing:.06em; margin-left:2px; }
  .auth-heading { font-family: 'DM Serif Display', Georgia, serif; font-size:22px; color:#E8F1F8; margin-bottom:4px; }
  .auth-sub { font-size:12px; color:var(--muted); margin-bottom:24px; line-height:1.6; }
  .auth-label { font-size:11px; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; margin-bottom:5px; font-weight:500; }
  .auth-input { width:100%; background:rgba(255,255,255,0.06); color:var(--tx); border:1px solid var(--navy-border2); border-radius:8px; padding:10px 13px; font-size:14px; outline:none; transition:border-color .15s; margin-bottom:14px; box-sizing:border-box; }
  .auth-input:focus { border-color:var(--sky-blue-mid); }
  .auth-btn { width:100%; padding:11px 0; font-size:14px; font-weight:600; border-radius:8px; border:none; background:var(--rose-deep); color:#fff; cursor:pointer; transition:background .15s; margin-top:4px; letter-spacing:.01em; }
  .auth-btn:hover { background:#A84E65; }
  .auth-btn.secondary { background:rgba(255,255,255,0.06); color:var(--muted); border:1px solid var(--navy-border2); font-weight:400; font-size:13px; margin-top:8px; }
  .auth-btn.secondary:hover { background:rgba(255,255,255,0.10); color:var(--tx); }
  .auth-error { font-size:12px; color:#E8907A; background:var(--rose-pale); border:1px solid var(--rose-border); border-radius:6px; padding:8px 11px; margin-top:10px; display:none; }
  .auth-divider { border:none; border-top:1px solid var(--navy-border); margin:18px 0; }
  .auth-guest-hint { font-size:11px; color:var(--faint); text-align:center; margin-top:14px; }
  .auth-guest-hint a { color:var(--sky-blue); cursor:pointer; text-decoration:underline; }

  /* v4.9.2: Guest banner deprecated — replaced by compact nav chip */
  #guest-banner { display: none !important; }
  .guest-badge { background: var(--rose-pale); border: 1px solid var(--rose-border); border-radius: 4px; padding: 2px 8px; font-size: 10px; letter-spacing: .07em; text-transform: uppercase; font-weight: 600; margin-right: 6px; }

  /* v4.9.2: Compact guest chip — lives in navbar upper-right */
  #nav-guest-chip {
    display: flex; align-items: center; gap: 4px;
    background: rgba(196,96,122,0.11);
    border: 1px solid rgba(196,96,122,0.28);
    border-radius: 20px;
    padding: 3px 5px 3px 9px;

let _guestChipObs = null;
function setupGuestScrollChip() {
  if (!isGuest()) return;
  const chip = document.getElementById('nav-guest-chip');
  if (!chip) return;

  // Disconnect any previous observer
  if (_guestChipObs) { _guestChipObs.disconnect(); _guestChipObs = null; }

  const welcome = document.getElementById('guest-hero-welcome');
  if (!welcome) {
    // No welcome card on this pane — show chip immediately
    chip.classList.remove('hidden');
    return;
  }

  // Start hidden (welcome card is visible on load)
  chip.classList.add('hidden');

  // rootMargin top offset = sticky nav height (52px)
  _guestChipObs = new IntersectionObserver(([entry]) => {
    chip.classList.toggle('hidden', entry.isIntersecting);
  }, { threshold: 0.05, rootMargin: '-52px 0px 0px 0px' });

  _guestChipObs.observe(welcome);
}

const PROFILE_KEY = 'jq_profile';

  name:'', titles:'', focus:'', salaryMin:'', salaryMax:'', location:'',
  workMode:'', noReloc:'', yearsExp:'', background:'', specialties:'',
  education:'', idealSignals:'', redFlagSignals:'', honestGaps:'', portfolioUrl:''
};
function getProfile() {
  try { const p = JSON.parse(localStorage.getItem(PROFILE_KEY) || 'null'); return p ? {...EMPTY_PROFILE, ...p} : null; }
  catch { return null; }
}
function saveProfile(p) { localStorage.setItem(PROFILE_KEY, JSON.stringify({...EMPTY_PROFILE, ...p})); }
function hasProfile() { return !!getProfile(); }

function salaryStr() {
  const p = getProfile() || EMPTY_PROFILE;
  const k = v => { const n = String(v).replace(/[^0-9]/g,''); return n ? '$'+n+'K' : ''; };
  const lo = k(p.salaryMin), hi = k(p.salaryMax);
  if (lo && hi) return lo+'–'+hi;
  return lo || hi || '';
}

// One-line identity summary (replaces the old PROFILE constant).
function profileLine() {
  const p = getProfile() || EMPTY_PROFILE;
  return [p.titles, p.focus, p.yearsExp && (p.yearsExp+' experience'),
          p.workMode, p.location, salaryStr()].filter(Boolean).join(' · ');
}

// Background paragraph used by networking / interview / research prompts.
function profileBackground() {
  const p = getProfile() || EMPTY_PROFILE;
  return [
    p.titles && ('Role target: '+p.titles+'.'),
    p.focus && ('Focus: '+p.focus+'.'),
    p.background,
    p.specialties && ('Specialties: '+p.specialties+'.'),
    p.education && ('Education: '+p.education+'.'),
    p.location && ('Location: '+p.location+(p.workMode?' ('+p.workMode+')':'')+'.'),
    salaryStr() && ('Target comp: '+salaryStr()+'.')
  ].filter(Boolean).join(' ');
}
function profileName() { return (getProfile()||EMPTY_PROFILE).name || 'you'; }

// Full system prompt for the JD fit analyzer, built from the profile.
function buildAnalyzeSystem() {
  const p = getProfile() || EMPTY_PROFILE;
  const L = [];
  L.push('You are a job search analyst helping a professional evaluate job postings against their profile.');
  L.push('');
  L.push('CANDIDATE PROFILE:');
  if (p.name) L.push('- Name: ' + p.name);
  if (p.titles) L.push('- Title target: ' + p.titles);
  if (p.yearsExp) L.push('- Experience: ' + p.yearsExp);
  if (p.focus) L.push('- Focus areas: ' + p.focus);
  if (p.specialties) L.push('- Specialties: ' + p.specialties);
  if (p.background) L.push('- Background: ' + p.background);
  if (p.education) L.push('- Education: ' + p.education);
  if (p.location || p.workMode) L.push('- Location: ' + [p.location, p.workMode].filter(Boolean).join(' — '));
  if (p.noReloc) L.push('- No relocation needed for: ' + p.noReloc + ' (never score roles in these areas as requiring relocation).');
  if (salaryStr()) L.push('- Target comp: ' + salaryStr());
  if (p.honestGaps) L.push('- HONEST GAPS: ' + p.honestGaps + ' Do NOT overstate these — frame as an adjacent foundation, motivated to learn.');
  L.push('');
  if (p.idealSignals)   L.push('IDEAL ROLE signals (boost fit score): ' + p.idealSignals);
  if (p.redFlagSignals) L.push('RED FLAG signals (lower fit score): ' + p.redFlagSignals);
  L.push('');
  L.push('Score honestly against this specific profile. A clear-eyed read of an imperfect match is more useful than inflated optimism.');
  return L.join('\n');
}

let cloudDirty = false; // true when local has unsynced changes

// v20: cloud writes are now debounced at 30s (was 1.5s) to conserve the free-tier
// request quota. Local storage still saves instantly on every change, so nothing
// is ever lost — the cloud is just a periodic mirror. A pending write is flushed
// immediately when the tab is hidden/closed so changes aren't stranded.
const SYNC_DEBOUNCE_MS = 30000;

// Flush any pending cloud write right now (used on tab hide / manual "Sync now")
async function flushCloudSave() {
  if (!cloudDirty || !state.ghToken || !state.ghGistId || isGuest()) return;
  clearTimeout(saveTimer); saveTimer = null;
  try {
    await ghWrite();
    cloudDirty = false;
    setSyncStatus('✓ synced ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}), false);
  } catch(e) {
    setSyncStatus('⚠ sync failed — ' + e.message + ' (saved locally)', true);
  }
}

// ── GITHUB GIST CLOUD SYNC ───────────────────────────────────────────────────

const GIST_FILE = 'jobquest.json';
const GIST_API  = 'https://api.github.com/gists';

function ghHeaders() {
  return {
    'Content-Type': 'application/json',
    'Authorization': `token ${state.ghToken}`,
    'Accept': 'application/vnd.github+json'
  };
}

// Read latest data from Gist
async function ghRead() {
  const resp = await fetch(`${GIST_API}/${state.ghGistId}`, { headers: ghHeaders() });
  if (!resp.ok) throw new Error(`Read failed ${resp.status}`);
  const gist = await resp.json();
  const raw = gist.files?.[GIST_FILE]?.content;
  if (!raw) throw new Error(`File "${GIST_FILE}" not found in Gist`);
  return JSON.parse(raw);
}

// Write current apps+contacts+tasks+referrals to Gist (debounced)
async function ghWrite() {
  if (!state.ghToken || !state.ghGistId) return;
  const payload = {
    apps: state.apps, contacts: state.contacts,
    tasks: state.tasks, referrals: state.referrals,
    version: 2, updatedAt: new Date().toISOString()
  };
  const resp = await fetch(`${GIST_API}/${state.ghGistId}`, {
    method: 'PATCH',
    headers: ghHeaders(),
    body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(payload) } } })
  });
  if (!resp.ok) throw new Error(`Write failed ${resp.status}`);
}

// Always save credentials to localStorage (device-level, intentionally local)
function saveCredentials() {
  if (state.ghToken)  localStorage.setItem('gh_token',   state.ghToken);
  if (state.ghGistId) localStorage.setItem('gh_gist_id', state.ghGistId);
  if (state.adzunaId)  localStorage.setItem('adzuna_id',   state.adzunaId);
  if (state.adzunaKey) localStorage.setItem('adzuna_key',  state.adzunaKey);
}

// Debounced cloud save — batches rapid changes into one write, 1.5s after last change
function save() {
  if (isGuest()) return; // v18: guests cannot mutate data
  saveCredentials();
  // Always persist EVERYTHING locally first — local is the source of truth,
  // cloud is a mirror. This guarantees a sync failure (403, offline, tab
  // suspend) can never lose data: the latest state is always on this device.
  localStorage.setItem('tasks', JSON.stringify(state.tasks));
  localStorage.setItem('referrals', JSON.stringify(state.referrals));
  localStorage.setItem('apps_backup', JSON.stringify(state.apps));
  localStorage.setItem('contacts_backup', JSON.stringify(state.contacts));
  localStorage.setItem('backup_updatedAt', new Date().toISOString());
  if (!state.ghToken || !state.ghGistId) {
    return;
  }
  clearTimeout(saveTimer);
  cloudDirty = true;
  saveTimer = setTimeout(async () => {
    setSyncStatus('saving…', false);
    try {
      await ghWrite();
      cloudDirty = false;
      setSyncStatus('✓ synced ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}), false);
    } catch(e) {
      setSyncStatus('⚠ sync failed — ' + e.message, true);
    }
  }, SYNC_DEBOUNCE_MS);
}

// v20: flush pending cloud write when the tab is backgrounded or closed so a
// debounced change is never stranded. visibilitychange fires reliably on mobile
// and desktop; pagehide covers hard closes.
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') flushCloudSave(); });
window.addEventListener('pagehide', () => { flushCloudSave(); });

function setSyncStatus(msg, isError) {
  state.cloudStatus = msg; state.cloudError = isError;
  const el = document.getElementById('sync-status');
  if (!el) return;
  el.style.transition = 'opacity .5s';
  el.style.opacity = '1';
  if (window._syncFade) clearTimeout(window._syncFade);
  if (isError) {
    // Clickable amber pill routes to Sync tab for investigation
    el.innerHTML = '<span onclick="showTab(\'sync\')" title="Click to open Sync tab" style="cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--amber);background:var(--gold-pale);border:1px solid var(--gold-border);padding:2px 8px;border-radius:10px;white-space:nowrap;letter-spacing:.02em">\u26a0 sync failed <span style="font-size:9px;opacity:.7">\u2192 Sync</span></span>';
  } else {
    el.innerHTML = '';
    el.textContent = msg;
    el.style.color = 'var(--green)';
    const isProgress = /\u2026$/.test(msg);
    if (!isProgress) {
      window._syncFade = setTimeout(() => {
        el.style.opacity = '0';
        setTimeout(() => { if (el.style.opacity === '0') el.textContent = ''; }, 500);
      }, 3500);
    }
  }
}

// Load data from GitHub Gist on startup
async function loadFromCloud() {
  if (!state.ghToken || !state.ghGistId) {
    // No cloud configured — try localStorage backup
    const appsBackup = localStorage.getItem('apps_backup');
    const contactsBackup = localStorage.getItem('contacts_backup');
    if (appsBackup) state.apps = JSON.parse(appsBackup);
    if (contactsBackup) state.contacts = JSON.parse(contactsBackup);
    return;
  }
  try {
    const data = await ghRead();
    // Guard against stale-cloud clobber: if local was saved more recently than
    // the cloud copy (e.g. writes were failing so cloud fell behind), keep local.
    const localTs = localStorage.getItem('backup_updatedAt');
    const cloudTs = data.updatedAt;
    const localIsNewer = localTs && (!cloudTs || new Date(localTs) > new Date(cloudTs));
    if (localIsNewer) {
      const appsBackup = localStorage.getItem('apps_backup');
      const contactsBackup = localStorage.getItem('contacts_backup');
      if (appsBackup) state.apps = JSON.parse(appsBackup);
      if (contactsBackup) state.contacts = JSON.parse(contactsBackup);
      setSyncStatus('✓ loaded local (newer than cloud) — will re-sync', false);
      save(); // push the newer local state back up to the cloud
    } else {
      if (data.apps)    state.apps    = data.apps;
      if (data.contacts) state.contacts = data.contacts;
      setSyncStatus('✓ loaded from cloud', false);
    }
  } catch(e) {
    setSyncStatus('⚠ cloud load failed — using local data', true);
    // Fall back to localStorage backup
    const appsBackup = localStorage.getItem('apps_backup');
    const contactsBackup = localStorage.getItem('contacts_backup');
    if (appsBackup) state.apps = JSON.parse(appsBackup);
    if (contactsBackup) state.contacts = JSON.parse(contactsBackup);
  }
}

// ── API CALLS ─────────────────────────────────────────────────────────────────

// All AI features route through the same-origin Cloudflare Pages Function at
// /api/claude. The Anthropic API key lives ONLY as the ANTHROPIC_API_KEY env var
// on your Cloudflare Pages deployment — never in the browser. See README.md.
const CLAUDE_URL = '/api/claude';
const CLAUDE_MODEL = 'claude-sonnet-4-5';

// The proxy adds auth server-side, so the browser sends no key/version headers.
function claudeHeaders(extra={}) { return { 'Content-Type': 'application/json', ...extra }; }

// Returns false when the proxy isn't reachable yet (e.g. running the file locally
// before deploying to Cloudflare). Callers surface a friendly message in that case.
async function claudePost(body) {
  const resp = await fetch(CLAUDE_URL, { method:'POST', headers: claudeHeaders(), body: JSON.stringify(body) });
  if (!resp.ok) {
    let msg = 'AI request failed (' + resp.status + ')';
    try { const j = await resp.json(); msg = j?.error?.message || msg; }
    catch { const t = await resp.text().catch(()=>''); if (t.includes('<html')) msg = 'The /api/claude proxy isn\u2019t responding — is your Cloudflare deployment live with ANTHROPIC_API_KEY set?'; }
    throw new Error(msg);
  }
  return resp;
}

async function claudeStream(prompt, onChunk) {
  let resp;
  try { resp = await claudePost({model:CLAUDE_MODEL,max_tokens:1000,stream:true,messages:[{role:'user',content:prompt}]}); }
  catch(e) { showToast(e.message); return ''; }
  const reader = resp.body.getReader(), dec = new TextDecoder();
  let full = '';
  while(true) {
    const {done,value} = await reader.read(); if(done) break;
    for(const line of dec.decode(value).split('\n').filter(l=>l.startsWith('data: '))) {
      try { const j=JSON.parse(line.slice(6)); if(j.delta?.text){full+=j.delta.text;onChunk?.(full);} } catch{}
    }
  }
  return full;
}

async function claudeJSON(prompt) {
  let resp;
  try { resp = await claudePost({model:CLAUDE_MODEL,max_tokens:800,messages:[{role:'user',content:prompt}]}); }
  catch(e) { showToast(e.message); return []; }
  const data = await resp.json();
  const text = data.content?.filter(b=>b.type==='text').map(b=>b.text).join('')||'';
  const s=text.indexOf('['),e=text.lastIndexOf(']');
  if(s===-1||e===-1) return [];
  return JSON.parse(text.slice(s,e+1));
}

function buildLinkedInURL() {
  const kw  = document.getElementById('li-keywords')?.value || ((getProfile()&&getProfile().titles) || 'product manager');
  const loc = document.getElementById('li-location')?.value || ((getProfile()&&getProfile().location) || '');
  const time = document.getElementById('li-time')?.value || 'month';
  const exp  = document.getElementById('li-exp')?.value  || 'senior';
  const p = new URLSearchParams();
  p.set('keywords', kw);
  if(loc) p.set('location', loc);
  if(LINKEDIN_TIME[time]) p.set('f_TPR', LINKEDIN_TIME[time]);
  if(LINKEDIN_EXP[exp])   p.set('f_E',   LINKEDIN_EXP[exp]);
  return LINKEDIN_BASE + '?' + p.toString();
}

function updateLiPreview() {
  const url = buildLinkedInURL();
  const el = document.getElementById('li-url-preview');
  if(el) el.textContent = url;
}

function openLinkedIn() { window.open(buildLinkedInURL(), '_blank'); }

function copyLinkedInURL() {
  navigator.clipboard?.writeText(buildLinkedInURL());
  const btn = event.target;
  const orig = btn.textContent;
  btn.textContent = 'Copied!';
  setTimeout(() => btn.textContent = orig, 1500);
}

function openAll(idx) {
  const ql = QUICK_LAUNCHES[idx];
  const hasCB = ql.urls.some(u => u.clipboard);
  if (hasCB) {
    const firstUrl = ql.urls.find(u => !u.clipboard);
    let term = ql.label;
    if (firstUrl) { try { term = new URL(firstUrl.url).searchParams.get('keywords') || ql.label; } catch(e) {} }
    navigator.clipboard?.writeText(term);
  }
  ql.urls.forEach(u => window.open(u.url, '_blank'));
  if (hasCB) showToast('Search term copied — paste on any board that opens');
}

function openBoardWithClip(url, e) {
  const btn = e.target;
  let term = 'senior product manager';
  try {
    const card = btn.closest('.card') || btn.parentElement.parentElement;
    const otherBtns = card.querySelectorAll('button[onclick*="window.open"]');
    for (const ob of otherBtns) {
      const m = ob.getAttribute('onclick').match(/keywords=([^&'"]+)/);
      if (m) { term = decodeURIComponent(m[1].replace(/\+/g,' ')); break; }
    }
  } catch(err) {}
  navigator.clipboard?.writeText(term);
  window.open(url, '_blank');
  showToast('Search term copied — paste it on the page that opens');
}

function showToast(msg) {
  let t = document.getElementById('clip-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'clip-toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--amber);color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:9999;box-shadow:0 2px 12px rgba(0,0,0,.2);transition:opacity .3s';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._hide);
  t._hide = setTimeout(() => t.style.opacity = '0', 3000);
}

function appFormHTML(prefix, app={}) {
  const pairs = [];
  let leftover = null;
  for(const f of APP_FORM_FIELDS) {
    if(f.type==='stage') {
      const field = `<div>${lbl(f.label)}${sel(`${prefix}-stage`,STAGES,app.stage||'Saved')}</div>`;
      if(leftover){ pairs.push(`<div class="g2" style="margin-bottom:8px">${leftover}${field}</div>`); leftover=null; }
      else leftover=field;
      continue;
    }
    if(f.type==='priority') {
      const field = `<div>${lbl(f.label)}${sel(`${prefix}-priority`,['High','Medium','Low'],app.priority||'High')}</div>`;
      if(leftover){ pairs.push(`<div class="g2" style="margin-bottom:8px">${leftover}${field}</div>`); leftover=null; }
      else leftover=field;
      continue;
    }
    const field = `<div>${lbl(f.label)}${inp(`${prefix}-${f.key}`,app[f.key]||'',f.ph)}</div>`;
    if(!f.half) {
      if(leftover){ pairs.push(`<div class="g2" style="margin-bottom:8px">${leftover}<div></div></div>`); leftover=null; }
      pairs.push(`<div style="margin-bottom:8px">${lbl(f.label)}${inp(`${prefix}-${f.key}`,app[f.key]||'',f.ph)}</div>`);
    } else {
      if(leftover){ pairs.push(`<div class="g2" style="margin-bottom:8px">${leftover}${field}</div>`); leftover=null; }
      else leftover=field;
    }
  }
  if(leftover) pairs.push(`<div class="g2" style="margin-bottom:8px">${leftover}<div></div></div>`);
  return pairs.join('');
}

function readAppForm(prefix) {
  const get = k => { const el=document.getElementById(`${prefix}-${k}`); return el?el.value.trim():''; };
  const obj = {};
  APP_FORM_FIELDS.forEach(f => { obj[f.key] = get(f.key); });
  obj.stage    = get('stage');
  obj.priority = get('priority');
  return obj;
}

function renderTracker(el) {
  const HIDDEN_STAGES = ['Rejected','Ghosted'];


  // High priority: apps flagged with priority==='High' — cap at 10
  const topPriority = state.apps
    .filter(a => a.priority==='High' && !HIDDEN_STAGES.includes(a.stage))
    .sort((a,b)=>(b.updatedAt||b.date||'').localeCompare(a.updatedAt||a.date||''))
    .slice(0,10);

  // View filter (appFilter) drives what shows BELOW the strip
  let list = [...state.apps].filter(a => !HIDDEN_STAGES.includes(a.stage) || state.appFilter==='archived');

  switch(state.appFilter) {
    case 'all':       list = list.filter(a=>!HIDDEN_STAGES.includes(a.stage)); break;
    case 'recent':    const cutoff=new Date(Date.now()-14*86400000).toISOString().slice(0,10);
                      list = list.filter(a=>!HIDDEN_STAGES.includes(a.stage) && (a.updatedAt||a.date||'')>=cutoff); break;
    case 'priority':  list = list.filter(a=>!HIDDEN_STAGES.includes(a.stage) && a.priority!=='High'); break;
    case 'archived':  list = list.filter(a=>HIDDEN_STAGES.includes(a.stage)); break;
    default:          list = list.filter(a=>a.stage===state.appFilter); break;
  }

  if(state.appSort==='updated') list.sort((a,b)=>(b.updatedAt||b.date||'').localeCompare(a.updatedAt||a.date||''));
  else if(state.appSort==='date') list.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  else if(state.appSort==='priority') { const p={High:3,Medium:2,Low:1}; list.sort((a,b)=>(p[b.priority]||0)-(p[a.priority]||0)); }

  // Exclude top-priority apps from the main list (they live in the strip)
  const topIds = new Set(topPriority.map(a=>a.id));
  if(state.appFilter!=='archived') list = list.filter(a=>!topIds.has(a.id));
  if(isGuest()) list = list.slice(0,5);

  // Stage counts for filter badges
  const STAGE_COUNTS = STAGES.reduce((acc,s)=>({...acc,[s]:state.apps.filter(x=>x.stage===s).length}),{});
  const activeCount  = state.apps.filter(a=>!HIDDEN_STAGES.includes(a.stage)).length;
  const archivedCount= state.apps.filter(a=>HIDDEN_STAGES.includes(a.stage)).length;

  // ── Top priority strip — same card format as main tracker cards ────────────
  const priorityStrip = topPriority.length ? `
    <div style="margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--navy-border)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="font-size:10px;color:var(--amber);letter-spacing:.09em;text-transform:uppercase;font-weight:600">⭐ High Priority (${topPriority.length}/10)</div>
        ${topPriority.length>=10 ? `<span style="font-size:11px;color:var(--red);font-weight:500">⚑ At limit</span>` : ''}
      </div>
      ${topPriority.map(a => {
        const isExp = state.appExpanded && state.appExpanded['top_'+a.id];
        const borderCol = {Saved:'var(--teal)',Offer:'var(--green)',Rejected:'var(--red)',Ghosted:'var(--purple)','Coffee / Networking':'var(--green)',Applied:'var(--blue)','Phone Screen':'var(--amber)',Interview:'var(--amber)','Final Round':'var(--green)'}[a.stage]||'var(--amber)';
        const cardBg = STAGE_CARD_BG[a.stage]||'var(--card-default)';
        const details = [a.salary&&pill(a.salary),a.location&&pill(a.location),fitPill(a)].filter(Boolean).join('');
        const nextLine = [a.nextStep,a.nextDate].filter(s=>s&&s!=='—').map(esc).join(' → ');
        const keyReqs = a.keyReqs&&a.keyReqs!=='—'?a.keyReqs:'';
        const gaps = a.gaps||a.notes||'';
        return `<div style="margin-bottom:8px;border-radius:8px;border:1px solid var(--navy-border);border-left:3px solid var(--amber);background:${cardBg};padding:1rem 1.25rem;animation:fadeIn .2s ease">
          <div class="app-card-inner" style="display:flex;flex-direction:column;gap:8px">
            <div style="flex:1;min-width:0">
              <div class="row" style="margin-bottom:3px;flex-wrap:wrap">
                <span style="font-size:14px;font-weight:600;color:var(--tx)">${esc(a.company)}</span>
                ${badge(a.stage,STAGE_COL[a.stage]||'amber')}
              </div>
              <div style="color:var(--muted);margin-bottom:5px;font-size:12px">${esc(a.role||'')}</div>
              ${details?`<div style="margin-bottom:5px;display:flex;flex-wrap:wrap;gap:2px">${details}</div>`:''}
              ${nextLine?`<div style="font-size:11px;color:var(--amber);margin-bottom:3px">→ ${nextLine}</div>`:''}
            </div>
            <div class="app-card-actions" style="display:flex;flex-wrap:wrap;align-items:center;gap:4px">
              ${sel('stg-top-'+a.id,STAGES,a.stage)}
              <button onclick="setAppStage(${a.id},document.getElementById('stg-top-${a.id}').value)" style="font-size:11px">Save</button>
              <button onclick="toggleHighPriority(${a.id})" title="Remove from high priority" style="font-size:11px;color:var(--amber);border-color:var(--amber-dim);background:var(--amber-bg)">⭐</button>
              <button onclick="openProfilePanel(${a.id})" style="font-size:11px;color:var(--gold);border-color:var(--gold-border);background:var(--gold-pale);font-weight:600">✦ Profile</button>
              <button onclick="state.appEditing=${a.id};render('tracker')" style="font-size:11px">Edit</button>
              <button onclick="toggleExpandTop(${a.id})" style="font-size:11px;color:var(--sky-blue);border-color:var(--sky-blue-mid);background:var(--sky-blue-pale)">${isExp?'▴ Details':'▾ Details'}</button>
            </div>
          </div>
          ${isExp && (keyReqs||gaps||(a.actLog&&a.actLog.length)) ? `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--brd)">
            ${keyReqs?`<div style="font-size:11px;color:var(--faint);margin-bottom:4px"><span style="color:var(--muted)">match:</span> ${esc(keyReqs)}</div>`:''}
            ${gaps&&gaps!=='—'?`<div style="font-size:11px;color:var(--faint);margin-bottom:6px"><span style="color:var(--muted)">notes:</span> ${esc(gaps)}</div>`:''}
            ${(a.actLog&&a.actLog.length) ? `
              <div style="padding-top:6px;border-top:1px solid var(--navy-border)">
                <div style="font-size:10px;color:var(--faint);letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px">Activity</div>

                  <div style="display:flex;gap:8px;font-size:10px;color:var(--faint);margin-bottom:2px">
                    <span style="color:var(--muted);white-space:nowrap">${e.date||''}</span>
                    <span>${esc(e.note||'')}</span>
                  </div>`).join('')}
              </div>` : ''}
          </div>` : ''}
        </div>`;
      }).join('')}
    </div>` : '';

  // ── Unified filter row: All + stages with entries + category filters + Archived ──
  const PIPELINE_STAGES = STAGES.filter(s => !HIDDEN_STAGES.includes(s));
  const unifiedBtns = [
    // All active
    `<button class="tag ${state.appFilter==='all'?'on':''}" onclick="setAppFilter('all')">All active (${activeCount})</button>`,

  const sortBtns = [{v:'updated',l:'Updated'},{v:'date',l:'Date applied'},{v:'priority',l:'Priority'}].map(s=>
    `<button class="tag ${state.appSort===s.v?'on':''}" onclick="state.appSort='${s.v}';render('tracker')" style="font-size:10px">${s.l}</button>`

  // ── Add form ───────────────────────────────────────────────────────────────
  const addForm = state.appShowAdd ? `
    <div class="card" style="border-color:var(--amber-dim);margin-bottom:12px">
      <div style="font-size:13px;font-weight:500;color:var(--tx);margin-bottom:12px">New application</div>
      ${appFormHTML('add')}
      <div class="row" style="margin-top:10px">
        <button class="amber" onclick="addApp()">Save application</button>

  // ── Application cards ──────────────────────────────────────────────────────
  const cards = list.map(app => {
    if(state.appEditing===app.id) {
      return `<div class="card" style="margin-bottom:8px;border-left:3px solid var(--amber)">
        <div style="font-size:12px;font-weight:500;color:var(--amber);margin-bottom:10px">Editing: ${esc(app.company)}</div>

        </div>
      </div>`;
    }

    const isExpanded   = state.appExpanded && state.appExpanded[app.id];
    const borderCol    = {Saved:'var(--teal)',Offer:'var(--green)',Rejected:'var(--red)',Ghosted:'var(--purple)','Coffee / Networking':'var(--green)',Applied:'var(--blue)','Phone Screen':'var(--amber)',Interview:'var(--amber)','Final Round':'var(--green)'}[app.stage]||'var(--brd2)';
    const cardBg       = STAGE_CARD_BG[app.stage]||'var(--card-default)';

    // Heat tag: saved role sitting >28 days
    let heatTag = '';
    if(app.stage === 'Saved' && app.savedAt) {
      const daysSaved = Math.floor((Date.now() - new Date(app.savedAt).getTime()) / 86400000);
      if(daysSaved >= 28) {
        const heatCol = daysSaved >= 56 ? '#E85D3A' : 'var(--amber)';
        const heatBg  = daysSaved >= 56 ? 'rgba(232,93,58,0.12)' : 'var(--amber-bg)';

        heatTag = `<span style="font-size:10px;padding:2px 7px;border-radius:4px;background:${heatBg};border:1px solid ${heatBrd};color:${heatCol};font-weight:600;white-space:nowrap">⏰ ${daysSaved}d saved</span>`;

    const nextLine     = isGuest()

    const keyReqs      = app.keyReqs&&app.keyReqs!=='—'?app.keyReqs:'';
    const gaps         = app.gaps||app.notes||'';
    const netRel       = app.netRel&&app.netRel!=='—'?app.netRel:'';
    const STAGE_CSS_COL = {Saved:'var(--teal)',Applied:'var(--blue)','Coffee / Networking':'var(--green)','Phone Screen':'var(--amber)',Interview:'var(--amber)','Final Round':'var(--green)',Offer:'var(--green)',Rejected:'var(--red)',Ghosted:'var(--purple)'};

    const isHigh       = app.priority==='High';

          ${app.netContact&&app.netContact!=='—'
            ? `<div style="font-size:11px;color:var(--teal);margin-bottom:3px;font-weight:500">🤝 ${isGuest()?'<span class="redacted">'+esc(app.netContact)+'</span>':esc(app.netContact)}${netRel?` <span style="font-weight:400;color:var(--faint)">· ${esc(netRel)}</span>`:''}</div>`

        <div class="app-card-actions" style="display:flex;flex-wrap:wrap;align-items:center;gap:4px">
          ${isGuest()
            ? `<button onclick="toggleExpand(${app.id})" style="font-size:11px;color:var(--sky-blue);border-color:var(--sky-blue-mid);background:var(--sky-blue-pale)">${isExpanded?'▴ Details':'▾ Details'}</button>`
            : `${sel(`stg-${app.id}`,STAGES,app.stage)}
            <button onclick="setAppStage(${app.id},document.getElementById('stg-${app.id}').value)" style="font-size:11px">Save</button>

            <button onclick="openProfilePanel(${app.id})" style="font-size:11px;color:var(--gold);border-color:var(--gold-border);background:var(--gold-pale);font-weight:600">✦ Profile</button>
            <button onclick="copyPrepPrompt(${app.id})" style="font-size:11px;color:var(--gold);border-color:var(--gold-border);background:var(--gold-pale);font-weight:600">✦ Prep</button>
            <button onclick="state.appEditing=${app.id};render('tracker')" style="font-size:11px">Edit</button>
            <button onclick="toggleExpand(${app.id})" style="font-size:11px;color:var(--sky-blue);border-color:var(--sky-blue-mid);background:var(--sky-blue-pale)">${isExpanded?'▴ Details':'▾ Details'}</button>

    const expanded = isExpanded ? `
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--brd)">
        ${app.reqNum&&app.reqNum!=='—'?`<div style="font-size:11px;color:var(--faint);margin-bottom:4px"><span style="color:var(--muted)">req #:</span> ${esc(app.reqNum)}</div>`:''}
        ${keyReqs?`<div style="font-size:11px;color:var(--faint);margin-bottom:4px"><span style="color:var(--muted)">match:</span> ${esc(keyReqs)}</div>`:''}
        ${gaps&&gaps!=='—'?`<div style="font-size:11px;color:var(--faint);margin-bottom:6px"><span style="color:var(--muted)">notes:</span> ${isGuest()?'<span class="redacted">'+esc(gaps)+'</span>':esc(gaps)}</div>`:''}
        ${(app.actLog&&app.actLog.length) ? `
          <div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--navy-border)">
            <div style="font-size:10px;color:var(--faint);letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px">Activity</div>
            ${app.actLog.slice(-5).reverse().map(e=>`
              <div style="display:flex;gap:8px;font-size:10px;color:var(--faint);margin-bottom:2px">
                <span style="color:var(--muted);white-space:nowrap">${e.date||''}</span>
                <span>${esc(e.note||'')}</span>

          </div>` : ''}
      </div>` : '';

    return `<div style="margin-bottom:8px;border-radius:8px;border:1px solid var(--navy-border);border-left:3px solid ${borderCol};background:${cardBg};padding:1rem 1.25rem;animation:fadeIn .2s ease">
      ${condensed}${expanded}
    </div>`;
  }).join('');

  const HIDDEN_STAGES_ALL = ['Rejected','Ghosted'];
  let totalApps    = state.apps.length;
  let appliedCount = state.apps.filter(a=>a.stage==='Applied').length;
  let savedCount   = state.apps.filter(a=>a.stage==='Saved').length;
  let interviewCt  = state.apps.filter(a=>['Phone Screen','Interview','Final Round'].includes(a.stage)).length;
  let highPriCt    = state.apps.filter(a=>a.priority==='High' && !HIDDEN_STAGES_ALL.includes(a.stage)).length;

  // v19: Guest mode — show real pipeline numbers on the dashboard stats
  if (isGuest()) {

  const dashAndJD = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;align-items:start">

        <div style="font-size:24px;font-weight:600;color:var(--sky-blue);line-height:1">${totalApps}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.04em">Total tracked</div>
      </div>
      <!-- 2x2 grid -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${[
          {label:'Active Apps',       val:appliedCount, col:'var(--blue)',  bg:'var(--blue-bg)',   filter:'Applied'},
          {label:'Saved / Queue', val:savedCount,   col:'var(--purple)',bg:'var(--purple-bg)', filter:'Saved'},
          {label:'Interviewing',  val:interviewCt,  col:'var(--amber)', bg:'var(--amber-bg)',  filter:'Interview'},
          {label:'High priority', val:highPriCt,    col:'var(--rose)',  bg:'var(--rose-pale)', filter:'priority'},
        ].map(d=>`<div onclick="setAppFilter('${d.filter}')" style="background:${d.bg};border:1px solid ${state.appFilter===d.filter?d.col:'rgba(0,0,0,0.06)'};border-radius:8px;padding:10px 12px;text-align:center;cursor:pointer;transition:all .15s;${state.appFilter===d.filter?'box-shadow:0 0 0 2px '+d.col+';':''}" onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">
          <div style="font-size:20px;font-weight:600;color:${d.col};line-height:1">${d.val}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:.03em">${d.label}</div>
        </div>`).join('')}
      </div>
    </div>
    <!-- RIGHT: Claude JD panel -->
    <div style="background:rgba(201,138,14,0.07);border:1px solid rgba(201,138,14,0.30);border-top:3px solid var(--gold);border-radius:8px;padding:14px">
      <div style="font-size:11px;font-weight:700;color:#E8C97A;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px">✦ Analyze a Job Description</div>
      <textarea id="tracker-jd-quick" rows="3" placeholder="Paste JD text here — get fit score, red flags &amp; save to tracker…" style="width:100%;font-size:12px;margin-bottom:8px;background:rgba(201,138,14,0.06);border:1px solid rgba(201,138,14,0.30);border-radius:6px;color:var(--tx);resize:none;padding:7px 10px"></textarea>
      <button onclick="openAnalyzeModalWithText(document.getElementById('tracker-jd-quick').value)" style="width:100%;font-size:12px;background:var(--gold);color:#fff;border-color:var(--gold);padding:8px 0;font-weight:600">⚡ Analyze JD</button>
      <div style="font-size:10px;color:rgba(201,150,26,0.6);margin-top:6px;text-align:center;letter-spacing:.02em">powered by claude · ~15 seconds · no data stored</div>
    </div>
  </div>`;

  const appSecHead = `
  <div style="margin-bottom:20px;border-radius:12px;overflow:hidden;border:1px solid rgba(91,160,210,0.20)">
    <div style="background:linear-gradient(135deg,#0D2033 0%,#1C3A50 100%);padding:18px 22px;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden">
      <svg width="54" height="54" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" style="position:absolute;top:14px;right:16px;filter:drop-shadow(2px 2px 0px #C4607A);opacity:0.9;pointer-events:none">
        <polygon points="16,2 18.2,10.5 26,7.5 21.5,14.5 30,16 21.5,17.5 26,24.5 18.2,21.5 16,30 13.8,21.5 6,24.5 10.5,17.5 2,16 10.5,14.5 6,7.5 13.8,10.5" fill="#F4F8FC"/>
      </svg>
      <div style="flex:1;min-width:0">
        <div style="font-size:10px;color:var(--rose);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px">
          <span style="display:inline-block;width:12px;height:1px;background:var(--rose-deep)"></span>pipeline · tracker · analyzer
        </div>
        <div style="font-size:46px;font-weight:400;color:#F4F8FC;line-height:1;letter-spacing:-.02em;font-style:italic;font-family:'DM Serif Display',Georgia,serif">Applications</div>
        <div style="font-size:12px;color:#B8D4E8;margin-top:6px;font-style:italic;font-family:'DM Serif Display',Georgia,serif">Track, analyze, and prioritize your search</div>
      </div>
    </div>
  </div>`;

  el.innerHTML = appSecHead + miniTimerWidget() + dashAndJD + `
    ${priorityStrip}
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;flex-wrap:wrap">
      <div class="stage-filters" style="margin-bottom:0;flex:1;min-width:0">${unifiedBtns}</div>
      ${isGuest() ? '' : `<button class="amber" onclick="state.appShowAdd=!state.appShowAdd;render('tracker')" style="flex-shrink:0;align-self:flex-start">+ Add</button>`}
    </div>
    <div style="display:flex;gap:6px;margin-bottom:14px;align-items:center;flex-wrap:wrap">
      <span style="font-size:11px;color:var(--faint)">Sort:</span>${sortBtns}
    </div>
    ${addForm}
    <div style="position:relative">
      ${cards||'<div class="empty">No applications in this view.</div>'}
      ${isGuest() ? `<div style="position:absolute;bottom:0;left:0;right:0;height:180px;background:linear-gradient(to bottom, transparent, var(--navy-deep) 90%);pointer-events:none;border-radius:0 0 8px 8px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:18px"><span style="font-size:11px;color:var(--muted);letter-spacing:.06em;background:rgba(255,255,255,.04);border:1px solid var(--navy-border2);padding:5px 14px;border-radius:20px">+ more applications in full view</span></div>` : ''}
    </div>
  `;
  updateMiniTimer();
}

function toggleHighPriority(id) {
  const app = state.apps.find(a=>a.id===id); if(!app) return;
  const currentlyHigh = app.priority==='High';
  if(!currentlyHigh) {
    const highCount = state.apps.filter(a=>a.priority==='High' && !['Rejected','Ghosted'].includes(a.stage)).length;
    if(highCount>=10) { showToast('⚑ You have 10 high priority apps — review before adding more'); return; }
  }
  state.apps = state.apps.map(a=>a.id===id?{...a,priority:currentlyHigh?'Medium':'High',updatedAt:new Date().toISOString()}:a);
  save(); render('tracker');
}

function toggleExpand(id) {
  if(!state.appExpanded) state.appExpanded={};
  state.appExpanded[id] = !state.appExpanded[id];
  render('tracker');
}

function toggleExpandTop(id) {
  if(!state.appExpanded) state.appExpanded={};
  state.appExpanded['top_'+id] = !state.appExpanded['top_'+id];
  render('tracker');
}


function setAppFilter(f) { state.appFilter=f; state.appEditing=null; render('tracker'); }

function setAppStage(id,stage) {
  const now = new Date().toISOString();
  state.apps = state.apps.map(a => {
    if(a.id !== id) return a;
    const actLog = [...(a.actLog||[]), {date: now.slice(0,10), note: `Stage → ${stage}`}];
    const savedAt = (stage === 'Saved' && !a.savedAt) ? now.slice(0,10) : (a.savedAt||'');
    return {...a, stage, savedAt, actLog, updatedAt: now};
  });
  save(); render('tracker');
}

function delApp(id) {
  const app = state.apps.find(a=>a.id===id); if(!app) return;
  const choice = window.confirm(
    `Archive "${app.company}"?\n\nOK = Move to Ghosted (keeps record)\nCancel = keep as-is\n\nTo permanently delete, use Edit and remove manually.`
  );
  if(choice) {
    state.apps = state.apps.map(a=>a.id===id?{...a,stage:'Ghosted',updatedAt:new Date().toISOString()}:a);
    save(); render('tracker');
    showToast('Moved to Ghosted — visible in Ghosted/Rejected view');
  }
}

function addApp() {
  const fields = readAppForm('add');
  if(!fields.company) return;
  const now = new Date().toISOString();
  const savedAt = fields.stage === 'Saved' ? now.slice(0,10) : '';
  state.apps.push({
    id: Date.now(),
    ...fields,
    savedAt,
    actLog: [{date: now.slice(0,10), note: 'Added to tracker'}],
    updatedAt: now
  });
  state.appShowAdd=false; save(); render('tracker');
}

function saveEdit(id) {
  const fields = readAppForm(`e-${id}`);
  const app = state.apps.find(a => a.id === id);
  const now = new Date().toISOString();
  const updates = { ...fields, updatedAt: now };
  if (app) {
    // Log stage changes
    if (fields.stage && fields.stage !== app.stage) {
      updates.actLog = [...(app.actLog||[]), {date: now.slice(0,10), note: `Stage → ${fields.stage}`}];
    }
    // Stamp savedAt when first moved to Saved
    if (fields.stage === 'Saved' && !app.savedAt) {
      updates.savedAt = now.slice(0,10);
    }
  }
  state.apps = state.apps.map(a => a.id===id ? { ...a, ...updates } : a);
  state.appEditing=null; save(); render('tracker');
}

function copyPrepPrompt(id) {
  const app = state.apps.find(a=>a.id===id); if(!app) return;
  const text = `Company: ${app.company}\nRole: ${app.role||''}\nStage: ${app.stage}\nMy background: ${profileBackground()}\nNotes: ${app.gaps||app.notes||''}\n\nPlease produce a structured interview prep guide for this role.`;
  navigator.clipboard?.writeText(text);
  const t=document.createElement('div');
  t.textContent='📋 Prep prompt copied — paste in Claude chat';
  Object.assign(t.style,{position:'fixed',bottom:'24px',left:'50%',transform:'translateX(-50%)',background:'var(--blue-bg)',border:'1px solid var(--blue)',color:'var(--blue)',padding:'8px 18px',borderRadius:'8px',fontSize:'12px',zIndex:'9999'});
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

function openProfilePanel(id) {
  const app = state.apps.find(a=>a.id===id); if(!app) return;
  state.profilePanelApp = app;
  state.profilePanelText = '';

  document.getElementById('profile-panel-title').textContent = app.company;
  document.getElementById('profile-panel-sub').textContent = app.role || '';
  document.getElementById('profile-copy-btn').style.display = 'none';
  document.getElementById('profile-panel-content').innerHTML =
    `<div class="profile-loading"><span class="spin"></span>Researching ${esc(app.company)}…</div>`;
  document.getElementById('profile-panel').classList.add('open');
  document.getElementById('profile-overlay').classList.add('open');
  buildProfile(app);
}

function closeProfilePanel() {
  document.getElementById('profile-panel').classList.remove('open');
  document.getElementById('profile-overlay').classList.remove('open');
}

async function buildProfile(app) {
  const prompt = `You are a company research assistant preparing ${profileName()} for a job application or coffee meeting. Candidate background: ${profileBackground()}

Company: ${app.company}
Role: ${app.role || 'Product Manager'}
Stage: ${app.stage}
Context: ${app.gaps || app.notes || ''}

Use web search to research this company. Produce a concise, scannable profile:

**🏢 Snapshot** — what they do, size, stage (startup/PE/public), HQ, founded
**💰 Business model** — how they make money, revenue or funding if known
**🛍️ Products** — core product(s), who they serve, key features
**🎯 Strategic position** — top 2-3 competitors with one-line differentiator each
**📈 Tailwinds** — 2-3 macro trends they are riding
**📰 Recent news** — last 6 months, anything relevant to this role
**🗣️ Talking points** — 4-5 specific points bridging the candidate's background to this company (use concrete numbers and product names where known)
**📊 Numbers to know** — 5-8 key stats to have memorized
**❓ Smart questions to ask** — 3 specific questions tailored to this stage (${app.stage})

Be specific throughout. If PE-backed, flag what that means strategically. Flag if the company has had recent layoffs or funding challenges.`;

  try {
    await claudeStream(prompt, t => {
      state.profilePanelText = t;
      const content = document.getElementById('profile-panel-content');
      if(!content) return;
      const html = t
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--tx)">$1</strong>')
        .replace(/^(#{1,3}) (.+)$/gm, (_,h,txt) => `<div class="profile-section-head" style="margin-top:${h.length===1?'0':'14px'}">${txt}</div>`)
        .replace(/^[-•] (.+)$/gm, '<div style="padding:2px 0 2px 10px;color:var(--muted);font-size:12px;line-height:1.7;border-left:2px solid var(--brd);margin:2px 0">$1</div>')
        .split('\n').map(line => line.startsWith('<')||!line.trim() ? line : `<p style="font-size:12px;color:var(--muted);line-height:1.7;margin:3px 0">${line}</p>`).join('\n');
      content.innerHTML = html;
    });
    document.getElementById('profile-copy-btn').style.display = 'block';
  } catch(e) {
    const content = document.getElementById('profile-panel-content');
    if(content) content.innerHTML = `<div style="color:var(--red);font-size:12px;padding:10px">Profile generation failed: ${esc(e.message)}<br><br>Make sure your Cloudflare deployment is live with <code>ANTHROPIC_API_KEY</code> set in its environment variables.</div>`;
  }
}

function copyProfile() {
  navigator.clipboard?.writeText(state.profilePanelText);
  const btn = document.getElementById('profile-copy-btn');
  if(btn){ btn.textContent='Copied!'; setTimeout(()=>btn.textContent='Copy',1500); }
}

function switchPomMode(i) {
  clearInterval(pomInterval); pomInterval=null;
  const mins=[25,5,15][i];
  const countUp = i===1; // short break is count-up
  state.pomMode=i; state.pomRunning=false; state.pomTotal=mins*60;
  state.pomSecs = countUp ? 0 : mins*60;
  render('pomodoro');
}

function togglePom() {
  if(state.pomRunning) { clearInterval(pomInterval); pomInterval=null; state.pomRunning=false; }
  else {
    state.pomRunning=true;
    const countUp = state.pomMode===1;
    pomInterval=setInterval(()=>{
      if(countUp) {
        state.pomSecs++;
        // Just update display — no auto-stop for count-up
        const m=Math.floor(state.pomSecs/60), s=state.pomSecs%60;
        const timeStr=`+${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        document.querySelectorAll('.pom-countdown-display').forEach(el=>el.textContent=timeStr);
        updateMiniTimer();
      } else {
        state.pomSecs--;
        if(state.pomSecs<=0) {
          clearInterval(pomInterval); pomInterval=null; state.pomRunning=false;
          if(state.pomMode===0) {
            state.pomSessions++;
            state.pomLog.push({task:state.pomCustomTask||state.pomTask,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),mins:[25,5,15][state.pomMode]});
          }
          state.pomSecs=0;
          render('pomodoro');
          updateMiniTimer();
        } else {
          const m=Math.floor(state.pomSecs/60), s=state.pomSecs%60;
          const timeStr=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
          document.querySelectorAll('.pom-countdown-display').forEach(el=>el.textContent=timeStr);
          updateMiniTimer();
        }
      }
    },1000);
  }
  render('pomodoro');
}

function resetPom() { clearInterval(pomInterval); pomInterval=null; state.pomRunning=false; state.pomSecs=state.pomTotal; render('pomodoro'); updateMiniTimer(); }

function updateMiniTimer() {
  const widgets = document.querySelectorAll('.mini-timer-widget');
  if(!widgets.length) return;
  const active = state.pomRunning || state.pomSecs > 0;
  if(!active) { widgets.forEach(w=>w.style.display='none'); return; }
  const countUp = state.pomMode===1;
  const m=Math.floor(state.pomSecs/60), s=state.pomSecs%60;
  const timeStr = countUp
    ? `+${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
    : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const task = countUp ? 'Short break' : (state.pomCustomTask||state.pomTask||'Focus session');
  const modeColors=['var(--amber)','var(--green)','var(--blue)'];
  const col=modeColors[state.pomMode]||'var(--amber)';
  widgets.forEach(w=>{
    w.style.display='flex';
    const cd=w.querySelector('.mini-cd');
    const tsk=w.querySelector('.mini-task');
    const dot=w.querySelector('.mini-dot');
    if(cd) cd.textContent=timeStr;
    if(tsk) tsk.textContent=task;
    if(dot) { dot.style.background=state.pomRunning?col:'var(--faint)'; dot.style.boxShadow=state.pomRunning?`0 0 6px ${col}`:'none'; }
  });
}

function applyPomCustom() {
  const m=parseInt(document.getElementById('pom-custom').value);
  if(!m||m<1||m>120) return;
  clearInterval(pomInterval); pomInterval=null;
  state.pomRunning=false; state.pomTotal=m*60; state.pomSecs=m*60; state.pomCustomMins='';
  render('pomodoro');
}

function setPomTask(t) { state.pomTask=t; state.pomCustomTask=''; render('pomodoro'); }
