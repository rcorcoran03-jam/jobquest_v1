function daysAgo(dateStr) {
  if(!dateStr) return null;
  const d = new Date(dateStr); if(isNaN(d)) return null;
  return Math.floor((Date.now() - d.getTime()) / 86400000);
}

function contactHeat(c) {
  const days = daysAgo(c.last);
  if(days === null) return 'new';
  if(days <= 14) return 'warm';
  if(days <= 60) return 'nudge';   // v20: nudge window widened 28 → 60 days
  return 'cold';
}

function heatMeta(heat) {
  return {
    warm:  {label:'Warm',   col:'var(--teal)',      bg:'var(--teal-pale)',   brd:'var(--teal-border)'},
    nudge: {label:'Nudge',  col:'var(--amber)',     bg:'var(--gold-pale)',   brd:'var(--gold-border)'},
    cold:  {label:'Cold',   col:'var(--faint)',     bg:'rgba(255,255,255,0.03)', brd:'var(--brd)'},
    new:   {label:'New',    col:'var(--sky-blue)',  bg:'var(--sky-blue-pale)', brd:'var(--sky-blue-mid)'},
  }[heat];
}

function addActivityLog(contactId, type, note, autoExpand, dateStr) {
  const idx = state.contacts.findIndex(x=>x.id===contactId); if(idx===-1) return;
  const date = dateStr || new Date().toISOString().slice(0,10);
  if(!state.contacts[idx].activityLog) state.contacts[idx].activityLog = [];
  state.contacts[idx].activityLog.unshift({type, note:note||'', date});
  // Keep log newest-first by date
  state.contacts[idx].activityLog.sort((a,b)=> (b.date||'').localeCompare(a.date||''));
  // 'last contact' = most recent touch; never move it backward on a retroactive entry
  // Use Date parsing (not string compare) so non-ISO values in curLast don't silently block updates
  const curLast = state.contacts[idx].last || '';
  const curLastMs = curLast ? new Date(curLast).getTime() : 0;
  const dateMs    = new Date(date + 'T00:00:00').getTime();
  if(!curLastMs || isNaN(curLastMs) || dateMs >= curLastMs) { state.contacts[idx].last = date; state.contacts[idx].lastActivityType = type; }
  if(autoExpand) { if(!state.netExpanded) state.netExpanded={}; state.netExpanded[contactId]=true; }
  save(); render('network');
  showToast('Activity logged ✓');
}

function renderNetwork(el) {
  const contacts = state.contacts || [];
  const filt = state.netFilter || {...NET_FILTER_DEFAULT};

  // Compute heat for all contacts
  const withHeat = contacts.map(c=>({...c, heat:contactHeat(c)}));

  // Dashboard counts
  let total  = contacts.length;
  let warm   = withHeat.filter(c=>c.heat==='warm'||c.heat==='new').length;
  let nudge  = withHeat.filter(c=>c.heat==='nudge').length;
  let cold   = withHeat.filter(c=>c.heat==='cold').length;

  // v19: Guest mode — override with real network numbers
  if (isGuest()) {
    total = 9;
    warm  = 5;
    nudge = 3;
    cold  = 1;
  }

  // Filter
  let filtered = withHeat;
  if(filt.view==='warm')  filtered = filtered.filter(c=>c.heat==='warm'||c.heat==='new');
  if(filt.view==='nudge') filtered = filtered.filter(c=>c.heat==='nudge');
  if(filt.view==='cold')  filtered = filtered.filter(c=>c.heat==='cold');
  if(filt.source) filtered = filtered.filter(c=>(c.source||'').toLowerCase().includes(filt.source.toLowerCase()));

  // Sort — 'smart' sections: Champions → Stars (top 10) → warmth; 'name' A–Z; 'recent' last-contacted desc
  const heatOrder = {new:0,warm:1,nudge:2,cold:3};
  const byHeatThenName = (a,b) => {
    if(heatOrder[a.heat]!==heatOrder[b.heat]) return heatOrder[a.heat]-heatOrder[b.heat];
    return (a.name||'').localeCompare(b.name||'');
  };
  if(filt.sort==='name') {
    filtered.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  } else if(filt.sort==='recent') {
    filtered.sort((a,b)=>(b.last||'').localeCompare(a.last||''));
  } else {
    // smart: sort within each tier, section grouping applied at render time
    filtered.sort(byHeatThenName);
  }

  // Get all unique sources for filter dropdown
  const sources = [...new Set(contacts.map(c=>c.source).filter(Boolean))];

  // Tile click helper
  const tileClick = (view) => `state.netFilter.view='${view}';render('network')`;
  const activeTile = (view) => filt.view===view;

  // Contact form
  const contactForm = (prefix, c={}, isEdit=false) => `
    <div class="card" style="border-top:2px solid var(--sky-blue);margin-bottom:12px">
      <div class="g2" style="margin-bottom:8px">
        ${inp(`${prefix}-name`,   c.name||'',    'Name *')}
        ${inp(`${prefix}-co`,     c.company||'', 'Company')}
        ${inp(`${prefix}-role`,   c.role||'',    'Their role')}
        ${inp(`${prefix}-source`, c.source||'',  'Referral source (optional)')}
        ${sel(`${prefix}-rel`,    ['Connection','Alumni','Recruiter','Cold Outreach'], c.rel||'Connection')}
        <input id="${prefix}-last" type="date" value="${esc(c.last||'')}" style="width:100%">
      </div>
      ${inp(`${prefix}-notes`, c.notes||'', 'Notes — context, how you know them')}
      <div style="font-size:10px;color:var(--amber);letter-spacing:.06em;text-transform:uppercase;font-weight:600;margin:10px 0 6px">Next action</div>
      <div class="g2" style="margin-bottom:8px">
        ${sel(`${prefix}-nexttype`, NEXT_TYPES.map(t=>({v:t.key,l:`${t.icon?t.icon+' ':''}${t.label}`})), c.nextType||'')}
        ${inp(`${prefix}-next`, c.next||'', 'Next date (YYYY-MM-DD)')}
      </div>
      ${inp(`${prefix}-nextnote`, c.nextNote||'', 'Next-action note (optional)')}
      <div style="display:flex;gap:16px;margin:10px 0 4px;align-items:center">
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--tx2);cursor:pointer">
          <input id="${prefix}-star" type="checkbox" ${c.star?'checked':''} style="width:14px;height:14px;accent-color:var(--sky-blue)"> ⭐ High Priority
        </label>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--tx2);cursor:pointer">
          <input id="${prefix}-champion" type="checkbox" ${c.champion?'checked':''} style="width:14px;height:14px;accent-color:var(--gold)"> 🏆 Champion
        </label>
      </div>
      <div class="row" style="margin-top:8px">
        <button style="background:var(--sky-blue);color:#fff;border-color:var(--sky-blue)" onclick="${isEdit?`saveEditContact(${c.id})`:'addContact()'}">${isEdit?'Save changes':'Save contact'}</button>
        <button onclick="${isEdit?`state.netEditing=null;render('network')`:`state.netShowAdd=false;render('network')`}">Cancel</button>
        ${isEdit?`<button class="danger" onclick="deleteContact(${c.id})" style="margin-left:auto">Delete</button>`:''}
      </div>
    </div>`;

  // Date formatter
  const fmtDate = d => { if(!d) return '—'; const dt=new Date(d+'T00:00:00'); return isNaN(dt)?d:dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}); };

  // Contact cards
  const renderCard = c => {
    if(state.netEditing===c.id) return contactForm(`edit-${c.id}`, c, true);

    const heat = c.heat;
    const hm = heatMeta(heat);
    const isCold = heat==='cold';
    const days = daysAgo(c.last);
    const lastAct = ACTIVITY_TYPES.find(a=>a.key===c.lastActivityType);

    // Last activity chip
    const lastChip = lastAct
      ? `<span style="font-size:10px;color:${lastAct.col};background:${lastAct.col}18;border:1px solid ${lastAct.col}33;padding:1px 7px;border-radius:8px;white-space:nowrap">${lastAct.icon} ${lastAct.label}</span>`
      : '';

    const heatBadge = `<span style="font-size:10px;color:${hm.col};background:${hm.bg};border:1px solid ${hm.brd};padding:1px 7px;border-radius:8px;font-weight:500;white-space:nowrap">${hm.label}</span>`;

    const isExpanded = state.netExpanded && state.netExpanded[c.id];

    // Right column — tag-style buttons matching sort row
    const rightCol = `<div class="net-col-right" style="display:flex;flex-direction:column;gap:0;flex-shrink:0;width:128px" onclick="event.stopPropagation()">
    </div>`;

    // Middle column — Last contact + last activity chip
    const midCol = `<div class="net-col-mid" style="flex:0 0 116px;padding:0 10px;display:flex;flex-direction:column;gap:3px;justify-content:center;border-left:1px solid var(--brd);border-right:1px solid var(--brd)">
      <div style="font-size:9px;color:var(--faint);letter-spacing:.07em;text-transform:uppercase;margin-bottom:2px">Last</div>
      <div style="font-size:11px;color:var(--tx)">
        ${isGuest()
          ? `<span class="redacted">${esc(fmtDate(c.last))}</span>`
          : `${fmtDate(c.last)}${days!==null?`<span style="color:var(--faint);font-size:10px"> · ${days}d</span>`:''}`}
      </div>
      ${isGuest() ? '' : lastChip}
      ${c.source&&!isGuest()?`<div style="font-size:10px;color:var(--faint)">via ${esc(c.source)}</div>`:''}
    </div>`;

    // Next column — planned next action (nudge reminder or scheduled meeting), between Last and Actions
    const nt = nextTypeMeta(c.nextType);
    const nextDays = c.next ? daysAgo(c.next) : null; // >0 means past due
    const nextOverdue = nextDays !== null && nextDays > 0;
    const nextSoon = nextDays !== null && nextDays <= 0 && nextDays >= -3;
    const hasNext = !!(c.next || (c.nextType && c.nextType!==''));
    const nextCol = `<div class="net-col-next" style="flex:0 0 118px;padding:0 10px;display:flex;flex-direction:column;gap:2px;justify-content:center;border-right:1px solid var(--brd)" onclick="event.stopPropagation()">
      <div style="font-size:9px;color:var(--faint);letter-spacing:.07em;text-transform:uppercase;margin-bottom:2px">Next</div>
      ${hasNext ? `
        <div style="font-size:11px;color:${nextOverdue?'var(--rose)':nt.col};font-weight:500">${nt.icon||'•'} ${isGuest()?`<span class="redacted">${c.next?fmtDate(c.next):'—'}</span>`:(c.next?fmtDate(c.next):'—')}</div>
        ${isGuest()?'':(nextOverdue?`<span style="font-size:9px;color:var(--rose)">⚠ ${nextDays}d overdue</span>`:nextSoon?`<span style="font-size:9px;color:var(--amber)">${nextDays===0?'today':'in '+(-nextDays)+'d'}</span>`:'')}
        ${c.nextNote&&!isGuest()?`<span style="font-size:10px;color:var(--faint);line-height:1.3">${esc(c.nextNote)}</span>`:(c.nextNote&&isGuest()?`<span class="redacted" style="font-size:10px">${esc(c.nextNote)}</span>`:'')}
        ${isGuest()?'':`<button onclick="clearNextAction(${c.id})" style="font-size:9px;color:var(--faint);background:none;border:none;padding:0;text-align:left;cursor:pointer;text-decoration:underline">clear</button>`}
      ` : (isGuest()?`<span style="font-size:10px;color:var(--faint)">—</span>`:`<button onclick="openActivityEditor(${c.id})" style="font-size:10px;color:var(--amber);background:var(--gold-pale);border:1px solid var(--gold-border);border-radius:5px;padding:3px 0;text-align:center">+ set</button>`)}
    </div>`;

    // Activity log — condensed rows, pencil edit per entry
    const actLog = (c.activityLog||[]).slice(0,8).map((entry, i)=>{
      const at = ACTIVITY_TYPES.find(a=>a.key===entry.type)||{icon:'·',col:'var(--faint)',label:entry.type};
      return `<div style="display:flex;gap:6px;align-items:baseline;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
        <span style="font-size:11px;flex-shrink:0">${at.icon}</span>
        <span style="font-size:11px;color:${at.col};flex-shrink:0">${at.label}</span>
        ${entry.note ? `<span style="font-size:11px;color:var(--faint);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"> — ${esc(entry.note)}</span>` : `<span style="flex:1"></span>`}
        <span style="font-size:10px;color:var(--faint);flex-shrink:0;white-space:nowrap">${fmtDate(entry.date)}</span>
        ${isGuest()?'':`<button onclick="openNoteEdit(${c.id},${i})" style="font-size:10px;color:var(--faint);background:none;border:none;padding:0 0 0 2px;cursor:pointer;flex-shrink:0" title="Edit note">✏</button>`}
      </div>`;
    }).join('');

    const expandedContent = isExpanded ? `
      <div style="margin-top:10px;padding-top:0;display:flex;flex-direction:column;gap:0">

        ${c.notes ? `
        <div style="padding:8px 0;border-top:1px solid var(--brd)">
          <div style="font-size:9px;color:var(--faint);letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px">Notes</div>
          <div style="font-size:12px;color:var(--muted);line-height:1.6">${isGuest()?'<span class="redacted">'+esc(c.notes)+'</span>':esc(c.notes)}</div>
        </div>` : ''}

        <div style="padding:8px 0;border-top:1px solid var(--brd)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
            <div style="font-size:9px;color:var(--faint);letter-spacing:.07em;text-transform:uppercase">Activity</div>
            ${isGuest()?'':`<button onclick="state.netEditing=${c.id};state.netShowAdd=false;render('network')" style="font-size:10px;color:var(--faint);background:none;border:none;padding:0;cursor:pointer">edit contact</button>`}
          </div>
          <div style="display:grid;grid-template-columns:auto 1fr 1fr 1fr;gap:3px;margin-bottom:6px" onclick="event.stopPropagation()">
            <button onclick="openActivityEditor(${c.id})" style="font-size:11px;color:var(--sky-blue);border-color:var(--sky-blue-mid);background:var(--sky-blue-pale);padding:5px 12px;font-weight:600;border-radius:6px;white-space:nowrap">+ Log</button>
            <button onclick="copyNetPrompt('nudge','${c.id}')" class="tag" style="font-size:10px;color:var(--sky-blue);border-color:var(--sky-blue-mid);background:var(--sky-blue-pale);padding:4px 4px;text-align:center;border-radius:20px">Nudge</button>
            <button onclick="copyNetPrompt('update','${c.id}')" class="tag" style="font-size:10px;padding:4px 4px;text-align:center;border-radius:20px">Update</button>
            <button onclick="copyNetPrompt('referral','${c.id}')" class="tag" style="font-size:10px;color:var(--rose);border-color:var(--rose-border);background:var(--rose-pale);padding:4px 4px;text-align:center;border-radius:20px">Ask</button>
          </div>
          ${actLog || `<div style="font-size:11px;color:var(--faint);font-style:italic">No activity yet.</div>`}
        </div>

      </div>` : '';


    return `<div class="card net-card${isExpanded?' net-card-expanded':''}" style="margin-bottom:7px;border-left:3px solid ${hm.col};border-radius:0 10px 10px 0;padding:10px 12px;opacity:${isCold?'0.62':'1'}">
      <div class="net-row" style="display:flex;gap:0;align-items:stretch">
        <!-- LEFT: who -->\
        <div style="flex:1;min-width:0;padding-right:10px;cursor:pointer" onclick="state.netExpanded=state.netExpanded||{};state.netExpanded[${c.id}]=!state.netExpanded[${c.id}];render('network')">
          <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:3px">
            <span style="font-size:13px;font-weight:600;color:var(--tx)">${isGuest() ? guestBlur(esc(c.name)) : esc(c.name)}</span>
            ${heatBadge}
            ${badge(c.rel, REL_COL[c.rel]||'blue')}
            ${!isGuest() ? `<button onclick="event.stopPropagation();toggleContactFlag(${c.id},'star')" title="${c.star?'Remove High Priority':'Mark High Priority'}" style="font-size:13px;background:none;border:none;padding:0;cursor:pointer;opacity:${c.star?'1':'0.25'};line-height:1;transition:opacity .15s" onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='${c.star?'1':'0.25'}'">⭐</button>` : ''}
            ${!isGuest() ? `<button onclick="event.stopPropagation();toggleContactFlag(${c.id},'champion')" title="${c.champion?'Remove Champion':'Mark as Champion'}" style="font-size:13px;background:none;border:none;padding:0;cursor:pointer;opacity:${c.champion?'1':'0.25'};line-height:1;transition:opacity .15s" onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='${c.champion?'1':'0.25'}'">🏆</button>` : ''}
          </div>
          <div style="color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${isGuest() ? [c.role&&`<span class="redacted">${esc(c.role)}</span>`,c.company&&esc(c.company)].filter(Boolean).join(' · ') : [c.role,c.company].filter(Boolean).map(esc).join(' · ')}</div>
          <div style="margin-top:4px;font-size:11px;color:var(--sky-blue);font-weight:500">${isExpanded?'▲ collapse':'▼ expand'}</div>
        </div>
        <!-- MIDDLE: last contact -->
        ${midCol}
        <!-- NEXT: planned next action -->
        ${nextCol}
      </div>
      ${expandedContent}
    </div>`;
  };

  // Build sectioned card list for smart sort (view=all), flat for all other sorts/filters
  const useSections = (filt.sort||'smart')==='smart' && filt.view==='all' && !isGuest();
  let cards = '';
  if(useSections) {
    const champions  = filtered.filter(c=>c.champion);
    const stars      = filtered.filter(c=>!c.champion && c.star).slice(0,10);
    const rest       = filtered.filter(c=>!c.champion && !c.star);
    const secHeader = (icon, label, count, col) =>
      `<div style="display:flex;align-items:center;gap:8px;margin:14px 0 6px;padding:0 2px">
        <span style="font-size:13px;line-height:1">${icon}</span>
        <span style="font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:${col}">${label}</span>
        <span style="font-size:10px;color:var(--faint);background:rgba(255,255,255,.05);border:0.5px solid var(--brd);padding:1px 7px;border-radius:10px">${count}</span>
        <span style="flex:1;height:1px;background:var(--brd);margin-left:2px"></span>
      </div>`;
    if(champions.length)  cards += secHeader('🏆','Champions', champions.length,'var(--gold)') + champions.map(renderCard).join('');
    if(stars.length)      cards += secHeader('⭐','Top Priority', stars.length,'var(--sky-blue)') + stars.map(renderCard).join('');
    if(rest.length)       cards += (champions.length||stars.length ? secHeader('','Pipeline', rest.length,'var(--faint)') : '') + rest.map(renderCard).join('');
  } else {
    cards = filtered.map(renderCard).join('');
  }

  // Overdue contacts — next action date is in the past
  const overdue = withHeat.filter(c => {
    const d = c.next ? Math.floor((Date.now() - new Date(c.next+'T00:00:00')) / 86400000) : -1;
    return d > 0;
  }).length;
  const warmPct = total > 0 ? Math.round((warm / total) * 100) : 0;

  const netHero = `
  <div style="margin-bottom:20px;border-radius:12px;overflow:hidden;border:1px solid rgba(42,181,160,0.22)">
    <div style="background:linear-gradient(135deg,#0D2033 0%,#1C3A50 100%);padding:18px 22px;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden">
      <svg width="54" height="54" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" style="position:absolute;top:14px;right:16px;filter:drop-shadow(2px 2px 0px rgba(42,181,160,0.5));opacity:0.9;pointer-events:none">
        <polygon points="16,2 18.2,10.5 26,7.5 21.5,14.5 30,16 21.5,17.5 26,24.5 18.2,21.5 16,30 13.8,21.5 6,24.5 10.5,17.5 2,16 10.5,14.5 6,7.5 13.8,10.5" fill="#2AB5A0"/>
      </svg>
      <div style="flex:1;min-width:0">
        <div style="font-size:10px;color:var(--teal);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px">
          <span style="display:inline-block;width:12px;height:1px;background:var(--teal)"></span>outreach · warm pipeline · referrals
        </div>
        <div style="font-size:46px;font-weight:400;color:#F4F8FC;line-height:1;letter-spacing:-.02em;font-style:italic;font-family:'DM Serif Display',Georgia,serif">Network</div>
        <div style="font-size:12px;color:#B8D4E8;margin-top:6px;font-style:italic;font-family:'DM Serif Display',Georgia,serif">Contacts, warm outreach &amp; referral pipeline</div>
      </div>
    </div>
    <div style="background:rgba(8,18,30,0.85);border-top:1px solid rgba(42,181,160,0.14);display:grid;grid-template-columns:repeat(4,1fr)">
      ${[
        {label:'Warm %',  val:warmPct+'%', col:'var(--teal)',    rest:'rgba(42,181,160,0.08)',  hover:'rgba(42,181,160,0.18)',  onclick:tileClick('warm')},
        {label:'Warm',    val:warm,        col:'var(--teal)',    rest:'rgba(42,181,160,0.06)',  hover:'rgba(42,181,160,0.14)',  onclick:tileClick('warm')},
        {label:'Nudge',   val:nudge,       col:'var(--amber)',   rest:'rgba(201,138,14,0.07)',  hover:'rgba(201,138,14,0.16)',  onclick:tileClick('nudge')},
        {label:'Overdue', val:overdue,     col:overdue>0?'var(--rose)':'var(--faint)', rest:overdue>0?'rgba(196,96,122,0.07)':'rgba(255,255,255,0.03)', hover:overdue>0?'rgba(196,96,122,0.15)':'rgba(255,255,255,0.07)', onclick:"state.netFilter.view='all';render('network')"},
      ].map(d=>`<div onclick="${d.onclick}" style="padding:10px 6px;text-align:center;cursor:pointer;border-right:1px solid rgba(255,255,255,0.05);background:${d.rest};transition:background .15s" onmouseover="this.style.background='${d.hover}'" onmouseout="this.style.background='${d.rest}'">
        <div style="font-size:18px;font-weight:700;color:${d.col};line-height:1;font-family:'DM Mono',monospace">${d.val}</div>
        <div style="font-size:9px;color:var(--faint);margin-top:3px;letter-spacing:.04em;text-transform:uppercase">${d.label}</div>
      </div>`).join('')}
    </div>
  </div>`;

  el.innerHTML = netHero + miniTimerWidget() + `
    ${total > 0 ? (() => {
      const nudgePct = Math.round((nudge / total) * 100);
      const coldPct  = Math.max(0, 100 - warmPct - nudgePct);
      return `<div style="margin-bottom:14px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <div style="display:flex;gap:12px">
            <span style="font-size:10px;color:var(--teal)">● ${warmPct}% warm</span>
            <span style="font-size:10px;color:var(--amber)">● ${nudgePct}% nudge</span>
            <span style="font-size:10px;color:${overdue>0?'var(--rose)':'var(--faint)'}">● ${coldPct}% overdue</span>
          </div>
          ${isGuest() ? '' : `<button style="background:var(--teal);color:#fff;border-color:var(--teal);font-size:11px" onclick="state.netShowAdd=!state.netShowAdd;state.netEditing=null;render('network')">+ Add contact</button>`}
        </div>
        <div style="display:flex;height:6px;border-radius:4px;overflow:hidden;gap:2px">
          ${warmPct  > 0 ? `<div style="flex:${warmPct};background:var(--teal);border-radius:4px 0 0 4px;transition:flex .4s" title="${warm} Warm (${warmPct}%)"></div>` : ''}
          ${nudgePct > 0 ? `<div style="flex:${nudgePct};background:var(--amber);transition:flex .4s" title="${nudge} Nudge (${nudgePct}%)"></div>` : ''}
          ${coldPct  > 0 ? `<div style="flex:${coldPct};background:${overdue>0?'var(--rose)':'var(--faint)'};opacity:${overdue>0?'0.7':'0.35'};border-radius:0 4px 4px 0;transition:flex .4s" title="${Math.round(coldPct/100*total)} Overdue (${coldPct}%)"></div>` : ''}
        </div>
      </div>`;
    })() : ''}

    <div style="display:flex;gap:6px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
      <span style="font-size:10px;color:var(--faint);letter-spacing:.05em;text-transform:uppercase">Sort:</span>

function copyNetPrompt(type, id) {
  const c = state.contacts.find(x=>String(x.id)===String(id)); if(!c) return;
  let prompt = '';
  const lastAct = c.activityLog?.[0];
  const lastContext = lastAct ? `Last activity: ${lastAct.type} on ${lastAct.date}${lastAct.note?'. '+lastAct.note:''}.` : (c.last?`Last contact: ${c.last}.`:'');

  if(type === 'nudge') {
    prompt = `Write a short, warm nudge message (2-3 sentences) from ${profileName()} to ${c.name}${c.company?' at '+c.company:''}. ${lastContext} Context: ${c.notes||'professional connection'}. Sender's background: ${profileBackground()} Keep it light and easy to respond to — no pressure.`;
  } else if(type === 'referral') {
    prompt = `Write a concise, warm referral request (4-5 sentences) from ${profileName()} to ${c.name}${c.company?' at '+c.company:''}. The sender is actively looking for new roles. Background: ${profileBackground()} Context: ${c.notes||'professional connection'}. Ask if they'd be willing to refer them or flag relevant openings. Acknowledge the relationship first — don't be transactional.`;
  } else if(type === 'update') {
    prompt = `Write a brief update message (3-4 sentences) from ${profileName()} to ${c.name}${c.company?' at '+c.company:''}. Share a relevant update on their job search — something genuine and brief. ${lastContext} Context: ${c.notes||'professional connection'}. Sender's background: ${profileBackground()} Make it feel like a natural check-in, not a status report.`;
  }

  navigator.clipboard?.writeText(prompt);
  const t = document.createElement('div');
  const typeLabel = {nudge:'Nudge',referral:'Referral ask',update:'Update'}[type]||type;
  t.textContent = `📋 ${typeLabel} prompt copied — paste in Claude chat`;
  Object.assign(t.style,{position:'fixed',bottom:'24px',left:'50%',transform:'translateX(-50%)',background:getComputedStyle(document.documentElement).getPropertyValue('--sky-blue-pale').trim(),border:`1px solid ${getComputedStyle(document.documentElement).getPropertyValue('--sky-blue-mid').trim()}`,color:getComputedStyle(document.documentElement).getPropertyValue('--sky-blue').trim(),padding:'8px 18px',borderRadius:'8px',fontSize:'12px',zIndex:'9999',fontFamily:'Avenir Next,system-ui,sans-serif'});
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2500);
}

const TASK_CATS = [
  {key:'all',     label:'All'},
  {key:'today',   label:'Today',     color:'var(--red)'},
  {key:'followup',label:'Follow-ups', color:'var(--amber)'},
  {key:'apply',   label:'Apply',     color:'var(--green)'},
  {key:'search',  label:'Search',    color:'var(--blue)'},
  {key:'network', label:'Network',   color:'var(--purple)'},
  {key:'profile', label:'Profile',   color:'var(--muted)'},
  {key:'other',   label:'Other',     color:'var(--faint)'},
];

function renderTasks(el) {
  const today = new Date().toISOString().slice(0,10);
  const filtered = state.taskFilter === 'all'
    ? state.tasks.filter(t=>!t.done)
    : state.taskFilter === 'done'
      ? state.tasks.filter(t=>t.done)
      : state.tasks.filter(t=>t.cat===state.taskFilter && !t.done);

  const pending  = state.tasks.filter(t=>!t.done).length;
  const overdue  = state.tasks.filter(t=>!t.done && t.due && t.due < today).length;
  const done     = state.tasks.filter(t=>t.done).length;

  const catBtns = [
    ...TASK_CATS,
    {key:'done', label:`Done (${done})`, color:'var(--faint)'}
  ].map(c =>
    `<button class="tag ${state.taskFilter===c.key?'on':''}" onclick="state.taskFilter='${c.key}';render('tasks')">${c.label}</button>`
  ).join('');

  const taskItems = filtered.map(t => {
    const cat = TASK_CATS.find(c=>c.key===t.cat);
    const isOverdue  = !t.done && t.due && t.due < today;
    const isDueSoon  = !t.done && t.due && t.due >= today && t.due <= new Date(Date.now()+2*86400000).toISOString().slice(0,10);
    return `<div style="display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:6px;background:${t.done?'transparent':isOverdue?'rgba(248,81,73,0.05)':'var(--surf)'};border:1px solid ${t.done?'var(--brd)':isOverdue?'var(--red)':isDueSoon?'var(--amber-dim)':'var(--brd)'};margin-bottom:6px;opacity:${t.done?'0.5':'1'}">
      <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${t.id})" style="width:16px;height:16px;margin-top:1px;flex-shrink:0;accent-color:var(--amber);cursor:pointer">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;color:${t.done?'var(--faint)':'var(--tx)'};text-decoration:${t.done?'line-through':'none'};margin-bottom:3px">${esc(t.text)}</div>
        <div class="row" style="gap:6px">
          ${cat&&cat.key!=='all'?`<span style="font-size:10px;padding:1px 7px;border-radius:10px;border:1px solid var(--brd);color:${cat.color||'var(--faint)'}">${cat.label}</span>`:''}
          ${t.priority==='high'?`<span style="font-size:10px;color:var(--amber)">● high</span>`:''}
          ${t.due?`<span style="font-size:10px;color:${isOverdue?'var(--red)':isDueSoon?'var(--amber)':'var(--faint)'}">${isOverdue?'overdue · ':isDueSoon?'due soon · ':''}${t.due}</span>`:''}
        </div>
      </div>
      <button onclick="deleteTask(${t.id})" style="font-size:10px;padding:2px 6px;color:var(--faint);border-color:transparent;flex-shrink:0">✕</button>
    </div>`;
  }).join('');

  const addForm = state.taskShowAdd ? `
    <div class="card" style="margin-bottom:12px;border-color:var(--amber-dim)">
      <div style="margin-bottom:8px">${lbl('Task')}${inp('task-text','','What needs doing…')}</div>
      <div class="g2" style="margin-bottom:8px;gap:8px">
        <div>${lbl('Category')}${sel('task-cat',TASK_CATS.filter(c=>c.key!=='all').map(c=>({v:c.key,l:c.label})),'today')}</div>
        <div>${lbl('Priority')}${sel('task-pri',[{v:'high',l:'High'},{v:'medium',l:'Medium'},{v:'low',l:'Low'}],'medium')}</div>
      </div>
      <div style="margin-bottom:8px">${lbl('Due date (optional)')}${inp('task-due','','YYYY-MM-DD')}</div>
      <div class="row">
        <button class="amber" onclick="addTask()">Add task</button>
        <button onclick="state.taskShowAdd=false;render('tasks')">Cancel</button>
      </div>
    </div>` : '';

  el.innerHTML = secHead('Tasks') + `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:12px;color:var(--muted)">
        <span style="color:var(--tx);font-weight:500">${pending}</span> pending
        ${overdue?` · <span style="color:var(--red)">${overdue} overdue</span>`:''}
        ${done?` · <span style="color:var(--faint)">${done} done</span>`:''}
      </div>
      <div class="row" style="gap:6px">
        <button onclick="clearDoneTasks()" style="font-size:11px;color:var(--faint)">Clear done</button>
        <button class="amber" onclick="state.taskShowAdd=!state.taskShowAdd;render('tasks')">+ Add task</button>
      </div>
    </div>
    ${addForm}
    <div class="tag-row">${catBtns}</div>
    ${taskItems || '<div class="empty">No tasks here. Nice work — or add some above.</div>'}
  `;
}

function toggleTask(id) {
  state.tasks = state.tasks.map(t => t.id===id ? {...t,done:!t.done} : t);
  save(); render('tasks');
}

function deleteTask(id) {
  state.tasks = state.tasks.filter(t => t.id!==id);
  save(); render('tasks');
}

function clearDoneTasks() {
  if(!confirm('Remove all completed tasks?')) return;
  state.tasks = state.tasks.filter(t => !t.done);
  save(); render('tasks');
}

function addTask() {
  const text = document.getElementById('task-text')?.value.trim();
  if(!text) return;
  state.tasks.push({
    id: Date.now(), text, done: false,
    cat:      document.getElementById('task-cat')?.value  || 'other',
    priority: document.getElementById('task-pri')?.value  || 'medium',
    due:      document.getElementById('task-due')?.value  || '',
  });
  state.taskShowAdd = false;
  save(); render('tasks');
}

function csvEscape(v) {
  const s = String(v == null ? '' : v);
  return (s.includes(',') || s.includes('"') || s.includes('\n')) ? `"${s.replace(/"/g,'""')}"` : s;
}

// ── XLSX EXPORT (SheetJS) ────────────────────────────────────────────────────
// Produces a real .xlsx file with:
//   Sheet 1 — data table, frozen header, auto-filter, color header, zebra rows
//   Sheet 2 — summary stats (pipeline breakdown, top companies, activity)

function hexToArgb(hex) {
  return 'FF' + hex.replace('#','').toUpperCase();
}

function applyHeaderStyle(ws, numCols, headerArgb) {
  for (let c = 0; c < numCols; c++) {
    const addr = XLSX.utils.encode_cell({r:0, c});
    if (!ws[addr]) continue;
    ws[addr].s = {
      fill:  { patternType:'solid', fgColor:{ rgb: headerArgb }, bgColor:{ rgb: headerArgb } },
      font:  { bold:true, color:{ rgb:'FFFFFFFF' }, name:'Calibri', sz:11 },
      alignment: { vertical:'center', wrapText:false },
      border: {
        bottom:{ style:'medium', color:{ rgb:'FFAAAAAA' } },
        right: { style:'thin',   color:{ rgb:'FF888888' } }
      }
    };
  }
}

function applyZebraStyle(ws, numRows, numCols, zebraArgb) {
  for (let r = 1; r <= numRows; r++) {
    const isZebra = r % 2 === 0;
    for (let c = 0; c < numCols; c++) {
      const addr = XLSX.utils.encode_cell({r, c});
      if (!ws[addr]) { ws[addr] = {t:'s', v:''}; }
      ws[addr].s = {
        fill: isZebra
          ? { patternType:'solid', fgColor:{ rgb: zebraArgb }, bgColor:{ rgb: zebraArgb } }
          : { patternType:'solid', fgColor:{ rgb: 'FFFFFFFF' }, bgColor:{ rgb: 'FFFFFFFF' } },
        font: { name:'Calibri', sz:10 },
        alignment: { vertical:'center', wrapText:false },
        border: {
          right:  { style:'hair', color:{ rgb:'FFDDDDDD' } },
          bottom: { style:'hair', color:{ rgb:'FFDDDDDD' } }
        }
      };
    }
  }
}

function setColWidths(ws, cols) {
  ws['!cols'] = cols.map(c => ({ wch: Math.min(Math.max(c.length + 4, 10), 36) }));
}

// Truncate long text values so notes/gaps fields don't blow out row heights
const CELL_MAX_CHARS = 120;
function truncateRow(row) {
  return row.map(v => {
    const s = String(v == null ? '' : v);
    return s.length > CELL_MAX_CHARS ? s.slice(0, CELL_MAX_CHARS) + '…' : s;
  });
}

function buildDataSheet(cols, rows, headerHex, zebraHex) {
  const aoa = [cols, ...rows.map(truncateRow)];
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  // Freeze top row (correct SheetJS key)
  ws['!sheetViews'] = [{ state:'frozen', ySplit:1, topLeftCell:'A2', activePane:'bottomLeft' }];
  // Auto-filter across all columns
  ws['!autofilter'] = { ref: XLSX.utils.encode_range({s:{r:0,c:0}, e:{r:rows.length, c:cols.length-1}}) };
  setColWidths(ws, cols);
  // Fix row heights — header taller, data rows capped at ~3 lines (~45pt)
  ws['!rows'] = [
    { hpt: 18, hpx: 18 },
    ...rows.map(() => ({ hpt: 18, hpx: 18 })) // data rows — ~3 lines max
  ];
  applyHeaderStyle(ws, cols.length, hexToArgb(headerHex));
  applyZebraStyle(ws, rows.length, cols.length, hexToArgb(zebraHex));
  return ws;
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).filter(l=>l.trim()).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h,i) => { obj[h.trim()] = (vals[i]||'').trim(); });
    return obj;
  });
}

function parseCSVLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for(let i=0;i<line.length;i++) {
    const c=line[i];
    if(c==='"'&&inQ&&line[i+1]==='"'){cur+='"';i++;}
    else if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){result.push(cur);cur='';}
    else cur+=c;
  }
  result.push(cur);
  return result;
}

function importAppsCSV(text) {
  const rows = parseCSV(text);
  if(!rows.length) return {count:0, skipped:0, msg:'No rows found in file.'};

  // Try to detect column mapping — accepts both exact Excel headers and app-internal keys
  const colMap = {};
  const firstRow = rows[0];
  const allHeaders = Object.keys(firstRow);

  // Map Excel column names → internal keys
  const excelToKey = {};
  APP_COLS.forEach((col,i) => { excelToKey[col] = APP_KEYS[i]; });
  // Also accept lowercase/trimmed variants
  APP_COLS.forEach((col,i) => { excelToKey[col.toLowerCase()] = APP_KEYS[i]; });
  // Also accept direct key names
  APP_KEYS.forEach(k => { excelToKey[k] = k; excelToKey[k.toLowerCase()] = k; });

  // Build per-row mapping
  const headerMap = {}; // header name → internal key
  allHeaders.forEach(h => {
    const key = excelToKey[h] || excelToKey[h.trim().toLowerCase()];
    if(key) headerMap[h] = key;
  });

  if(!headerMap['Company'] && !headerMap['company']) {
    return {count:0, skipped:0, msg:`Could not find a "Company" column. Headers found: ${allHeaders.slice(0,5).join(', ')}…`};
  }

  let added=0, skipped=0, updated=0;
  const existingCos = state.apps.map(a=>a.company.toLowerCase().trim());

  rows.forEach(row => {
    const mapped = {};
    Object.entries(headerMap).forEach(([h,k]) => { mapped[k] = row[h]||''; });
    const co = (mapped.company||'').trim();
    if(!co) { skipped++; return; }

    const existIdx = existingCos.indexOf(co.toLowerCase());
    if(existIdx !== -1) {
      // Update existing — merge in any non-empty fields from CSV
      const existing = state.apps[existIdx];
      APP_KEYS.forEach(k => { if(mapped[k]) existing[k] = mapped[k]; });
      updated++;
    } else {
      state.apps.push({
        id: Date.now() + Math.random(),
        company: mapped.company||'',
        role: mapped.role||'',
        salary: mapped.salary||'',
        location: mapped.location||'',
        date: mapped.date||'',
        stage: mapped.stage||'Applied',
        priority: mapped.priority||'Medium',
        fit: mapped.fit||'',
        keyReqs: mapped.keyReqs||'',
        gaps: mapped.gaps||'',
        nextStep: mapped.nextStep||'',
        nextDate: mapped.nextDate||'',
        contact: mapped.contact||'',
        source: mapped.source||'',
        notes: mapped.notes||mapped.gaps||'',
      });
      added++;
    }
  });

  save();
  return {count:added, updated, skipped, msg:`Done — ${added} added, ${updated} updated, ${skipped} skipped (blank company).`};
}

function importContactsCSV(text) {
  const rows = parseCSV(text);
  if(!rows.length) return {count:0, msg:'No rows found.'};
  let added=0, skipped=0;
  const existingNames = state.contacts.map(c=>c.name.toLowerCase().trim());
  rows.forEach(row => {
    const name = (row['Alumni Contact']||row['Name']||row['name']||'').trim();
    if(!name){skipped++;return;}
    if(existingNames.includes(name.toLowerCase())){skipped++;return;}
    state.contacts.push({
      id: Date.now()+Math.random(), name,
      company: row['Company']||row['company']||'',
      role: row['Role']||row['role']||'',
      rel: row['Relationship']||row['rel']||'Connection',
      last: row['Last Touch']||row['last']||'',
      next: row['Next Touch']||row['next']||'',
      notes: row['Notes']||row['notes']||'',
    });
    added++;
  });
  save();
  return {count:added, skipped, msg:`Done — ${added} contacts added, ${skipped} skipped.`};
}

function exportApps(fmt) {
  const note = document.getElementById('export-note');
  const date = new Date().toISOString().slice(0,10);
  if (fmt === 'csv') {
    const csv = 'data:text/csv;charset=utf-8,' + encodeURIComponent(
      [APP_KEYS.join(','), ...state.apps.map(a => APP_KEYS.map(k => csvEscape(a[k]||'')).join(','))].join('\n')
    );
    const a = Object.assign(document.createElement('a'), {href: csv, download: `applications_${date}.csv`});
    a.click();
    if (note) note.textContent = `✓ Downloaded ${state.apps.length} applications (CSV)`;
  } else {
    exportAppsXLSX();
    if (note) note.textContent = `✓ Downloaded ${state.apps.length} applications (XLSX) at ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
  }
}

function exportContacts(fmt) {
  const note = document.getElementById('export-note');
  const date = new Date().toISOString().slice(0,10);
  if (fmt === 'csv') {
    const csv = 'data:text/csv;charset=utf-8,' + encodeURIComponent(
      [NET_KEYS.join(','), ...state.contacts.map(c => NET_KEYS.map(k => csvEscape(c[k]||'')).join(','))].join('\n')
    );
    const a = Object.assign(document.createElement('a'), {href: csv, download: `contacts_${date}.csv`});
    a.click();
    if (note) note.textContent = `✓ Downloaded ${state.contacts.length} contacts (CSV)`;
  } else {
    exportContactsXLSX();
    if (note) note.textContent = `✓ Downloaded ${state.contacts.length} contacts (XLSX)`;
  }
}

function doImportApps() {
  const file = document.getElementById('import-apps-file').files[0];
  if(!file){ alert('Pick a CSV file first.'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const result = importAppsCSV(e.target.result);
    const n=document.getElementById('import-note');
    if(n){ n.style.color = result.count>0||result.updated>0 ? 'var(--green)' : 'var(--red)'; n.textContent=result.msg; }
    render('sync');
  };
  reader.readAsText(file, 'UTF-8');
}

async function doMigrateFromJsonBin() {
  const token  = document.getElementById('setup-gh-token').value.trim();
  const gistId = document.getElementById('setup-gh-gist').value.trim();
  const statusEl = document.getElementById('migrate-status');
  const errEl    = document.getElementById('setup-error');
  if (!token)  { errEl.textContent = 'Enter your GitHub PAT above first.'; return; }
  if (!gistId) { errEl.textContent = 'Enter your Gist ID above first.'; return; }

  const btn = document.getElementById('migrate-btn');
  btn.disabled = true; btn.textContent = 'Reading JSONBin…';
  statusEl.style.color = 'var(--muted)';
  statusEl.textContent = 'Step 1 of 3 — reading your data from JSONBin…';

  const oldKey = localStorage.getItem('jb_key');
  const oldBin = localStorage.getItem('jb_bin');

  try {
    // Step 1: read from JSONBin using old credentials
    const jbResp = await fetch('https://api.jsonbin.io/v3/b/' + oldBin + '/latest', {
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': oldKey, 'X-Bin-Meta': 'false' }
    });
    if (!jbResp.ok) throw new Error('JSONBin read failed ' + jbResp.status);
    const jbData = await jbResp.json();

    const appCount = (jbData.apps || []).length;
    const contactCount = (jbData.contacts || []).length;
    statusEl.textContent = 'Step 2 of 3 — got ' + appCount + ' apps, ' + contactCount + ' contacts. Connecting to Gist…';
    btn.textContent = 'Connecting to Gist…';

    // Step 2: verify Gist is reachable
    state.ghToken = token; state.ghGistId = gistId;
    await ghRead();

    statusEl.textContent = 'Step 3 of 3 — pushing to Gist…';
    btn.textContent = 'Pushing to Gist…';

    // Step 3: load JSONBin data into state and push to Gist
    if (jbData.apps)      state.apps      = jbData.apps;
    if (jbData.contacts)  state.contacts  = jbData.contacts;
    if (jbData.tasks)     state.tasks     = jbData.tasks;
    if (jbData.referrals) state.referrals = jbData.referrals;

    await ghWrite();
    saveCredentials();

    // Sync localStorage backup to match
    localStorage.setItem('apps_backup',      JSON.stringify(state.apps));
    localStorage.setItem('contacts_backup',  JSON.stringify(state.contacts));
    localStorage.setItem('tasks',            JSON.stringify(state.tasks));
    localStorage.setItem('referrals',        JSON.stringify(state.referrals));
    localStorage.setItem('backup_updatedAt', new Date().toISOString());

    statusEl.style.color = 'var(--green)';
    statusEl.textContent = '✓ Migration complete — ' + appCount + ' apps and ' + contactCount + ' contacts synced to Gist.';
    setTimeout(() => {
      showTab('board');
      setSyncStatus('✓ migrated from JSONBin · ' + appCount + ' apps', false);
    }, 1500);

  } catch(e) {
    state.ghToken = ''; state.ghGistId = '';
    statusEl.style.color = 'var(--red)';
    statusEl.textContent = 'Migration failed: ' + e.message;
    btn.disabled = false; btn.textContent = 'Migrate from JSONBin →';
  }
}

async function doCloudSetup() {
  const token = document.getElementById('setup-gh-token').value.trim();
  const gistId = document.getElementById('setup-gh-gist').value.trim();
  const errEl = document.getElementById('setup-error');
  if (!token) { errEl.textContent = 'Please enter your GitHub PAT.'; return; }
  if (!gistId) { errEl.textContent = 'Please enter your Gist ID.'; return; }
  const btn = document.getElementById('setup-btn');
  btn.disabled = true; btn.textContent = 'Connecting…';
  state.ghToken = token; state.ghGistId = gistId;
  try {
    // Verify the Gist is reachable and load any existing data.
    // If the Gist is empty (first-time setup), keep the local state as-is
    // so we can push it up immediately below.
    const data = await ghRead();
    if (data.apps && data.apps.length > 0)      state.apps      = data.apps;
    if (data.contacts && data.contacts.length > 0) state.contacts = data.contacts;
    // Before pushing, load the localStorage backup into state so we send
    // real data, not the in-memory defaults (initApp returned early for setup screen)
    if (!data.apps || data.apps.length === 0) {
      const appsBackup    = localStorage.getItem('apps_backup');
      const contactsBackup = localStorage.getItem('contacts_backup');
      const tasksBackup    = localStorage.getItem('tasks');
      const referralsBackup = localStorage.getItem('referrals');
      if (appsBackup)     state.apps      = JSON.parse(appsBackup);
      if (contactsBackup) state.contacts  = JSON.parse(contactsBackup);
      if (tasksBackup)    state.tasks     = JSON.parse(tasksBackup);
      if (referralsBackup) state.referrals = JSON.parse(referralsBackup);
    }
    saveCredentials();
    errEl.textContent = '';
    // Push current local state to Gist immediately (don't use save() — it's debounced 30s)
    btn.textContent = 'Pushing data…';
    await ghWrite();
    showTab('board');
    setSyncStatus('✓ cloud connected · ' + state.apps.length + ' apps synced', false);
  } catch(e) {
    state.ghToken = ''; state.ghGistId = '';
    errEl.textContent = 'Could not connect: ' + e.message;
    btn.disabled = false; btn.textContent = 'Connect →';
  }
}

function skipCloudSetup() {
  localStorage.setItem('cloud_skipped', '1');
  showTab('board');
}

function disconnectCloud() {
  if (!confirm('Disconnect cloud sync? Your data stays on this device but won\'t sync to other devices.')) return;
  state.ghToken = ''; state.ghGistId = '';
  localStorage.removeItem('gh_token'); localStorage.removeItem('gh_gist_id');
  localStorage.removeItem('cloud_skipped');
  location.reload();
}

async function initApp() {
  const hasCloud = state.ghToken && state.ghGistId;
  const skipped  = localStorage.getItem('cloud_skipped');

  // First run after the profile wizard: offer cloud backup setup.
  if (!hasCloud && !skipped) {
    const el = document.getElementById('pane-board');
    renderCloudSetup(el);
    return;
  }

  if (hasCloud) setSyncStatus('loading…', false);
  // loadFromCloud() loads the GitHub Gist when configured, and falls back to the
  // localStorage backup otherwise — so local-only data is always rehydrated.
  await loadFromCloud();

  // Migrate rel values from old vocabulary
  const REL_MIGRATE = {'Warm':'Connection','Cold':'Cold Outreach'};
  if(state.contacts)  state.contacts.forEach(c=>{ if(REL_MIGRATE[c.rel]) c.rel=REL_MIGRATE[c.rel]; });
  if(state.referrals) state.referrals.forEach(r=>{ if(REL_MIGRATE[r.rel]) r.rel=REL_MIGRATE[r.rel]; });

  render('board');
}

  };

    <div style="max-width:680px;margin:0 auto;padding:36px 18px 60px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
        <svg width="24" height="24" viewBox="0 0 32 32"><polygon points="16,2 18.2,10.5 26,7.5 21.5,14.5 30,16 21.5,17.5 26,24.5 18.2,21.5 16,30 13.8,21.5 6,24.5 10.5,17.5 2,16 10.5,14.5 6,7.5 13.8,10.5" fill="#E8F1F8"/></svg>
        <span style="font-size:18px;font-weight:700;color:var(--tx)">JobQuest</span>
        <span style="font-size:11px;color:var(--faint);border:1px solid var(--brd2);border-radius:10px;padding:1px 7px">setup</span>
      </div>
      <div style="font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:6px">
        ${editing ? 'Edit your profile. Everything the AI features use is built from these fields.'
                  : 'Tell JobQuest who you are. Your profile drives the JD fit analyzer, interview prep, company research, and networking drafts. Stored only in your browser (and your private Gist once you connect backup).'}
      </div>

      ${!editing ? `
      <div class="card" style="margin:16px 0;border-color:var(--brd2);background:var(--surf2)">
        <div style="font-size:12px;color:var(--muted);line-height:1.6">Just want to look around first?
          <button onclick="loadExampleData()" style="font-size:12px;color:var(--blue);border-color:var(--blue);background:var(--blue-bg);margin-left:6px;padding:3px 12px">Load example data →</button>
        </div>
      </div>` : ''}

      <div class="card" style="margin-top:14px;border-color:var(--amber-dim);border-left:3px solid var(--amber)">
        <div style="${WZ_LABEL}">✨ Draft from résumé (optional)</div>
        <div style="font-size:12px;color:var(--muted);line-height:1.6;margin:6px 0 8px">Paste your résumé and let Claude pre-fill the fields below. Needs your Cloudflare deployment live — otherwise just fill them in by hand.</div>
        <textarea id="wz-resume" rows="4" placeholder="Paste résumé text here…" style="${WZ_INPUT};resize:vertical"></textarea>
        <button id="wz-draft-btn" onclick="wizardDraftFromResume()" class="amber" style="margin-top:10px;font-size:12px;padding:8px 16px">✨ Draft from résumé</button>
      </div>

      ${sectionHead('Basics')}
      ${fld('wz-name','Name', p.name, 'Your name')}
      ${fld('wz-titles','Target titles', p.titles, 'e.g. Senior PM / Director of Product')}
      ${fld('wz-focus','Focus areas', p.focus, 'e.g. fintech, platform, growth')}
      ${fld('wz-years','Years of experience', p.yearsExp, 'e.g. 6+ years')}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        ${fld('wz-salmin','Target comp — min ($K)', p.salaryMin, 'e.g. 140')}
        ${fld('wz-salmax','Target comp — max ($K)', p.salaryMax, 'e.g. 180')}
      </div>
      ${fld('wz-location','Location', p.location, 'e.g. Austin, TX or Remote')}
      ${fld('wz-workmode','Work mode', p.workMode, 'e.g. Remote ok, hybrid preferred, in-person ok')}
      ${fld('wz-noreloc','Not relocation', p.noReloc, 'Areas the analyzer should never flag as relocation', 'input', 'e.g. your metro and its suburbs')}

      ${sectionHead('Background')}
      ${fld('wz-background','Background summary', p.background, 'A few sentences on your key experience and concrete results', 'area')}
      ${fld('wz-specialties','Specialties', p.specialties, 'comma-separated skills / areas', 'area')}
      ${fld('wz-education','Education', p.education, 'degrees, notable programs')}

      ${sectionHead('Fit criteria')}
      ${fld('wz-ideal','Ideal-role signals', p.idealSignals, 'what makes a role a strong fit — boosts the score', 'area')}
      ${fld('wz-redflags','Red-flag signals', p.redFlagSignals, 'what lowers a role\u2019s score', 'area')}
      ${fld('wz-gaps','Honest gaps', p.honestGaps, 'gaps stated plainly — the analyzer frames these fairly, not as dealbreakers', 'area')}
      ${fld('wz-portfolio','Portfolio URL (optional)', p.portfolioUrl, 'https://…')}

      <div style="display:flex;gap:10px;margin-top:24px;align-items:center">
        <button onclick="saveWizardProfile()" class="amber" style="font-size:13px;padding:10px 22px;font-weight:600">${editing ? 'Save changes' : 'Save & continue →'}</button>
        ${editing ? `<button onclick="closeSetupWizard();render(state.tab||'board')" style="font-size:12px">Cancel</button>` : ''}
        <span style="font-size:11px;color:var(--faint)">Name and at least one target title are required.</span>

}

async function wizardDraftFromResume() {
  const txt = wzGet('wz-resume');
  if (!txt || txt.length < 40) { showToast('Paste your résumé text first.'); return; }
  const btn = document.getElementById('wz-draft-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Drafting…'; }
  const prompt = `From the résumé below, extract a job-search profile. Return ONLY a JSON object — no prose, no code fences — with these string fields: name, titles (target job titles), focus (focus areas/domains), yearsExp (e.g. "6+ years"), salaryMin (digits only, in thousands, your best estimate or ""), salaryMax (digits only, in thousands, or ""), location, workMode, specialties (comma-separated), background (2-3 sentence summary of key experience with concrete results), education, idealSignals (comma-separated signals that make a role a strong fit), redFlagSignals (comma-separated signals that lower fit), honestGaps (gaps stated honestly). Use "" for anything unknown.

RÉSUMÉ:
${txt}`;
  try {
    const resp = await claudePost({ model: CLAUDE_MODEL, max_tokens: 1200, messages: [{ role:'user', content: prompt }] });
    const data = await resp.json();
    const out = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
    const s = out.indexOf('{'), e = out.lastIndexOf('}');
    if (s === -1 || e === -1) throw new Error('Could not read a profile from the response.');
    const drafted = JSON.parse(out.slice(s, e+1));
    _wizardDraft = { ...EMPTY_PROFILE, ...readWizardInputs(), ...drafted };
    renderSetupWizard();
    showToast('Draft ready — review and edit below ✓');
  } catch (err) {
    if (btn) { btn.disabled = false; btn.textContent = '✨ Draft from résumé'; }
    showToast(err.message || 'Draft failed.');
  }
}

function saveWizardProfile() {
  const p = readWizardInputs();
  if (!p.name)   { showToast('Add your name to continue.');           document.getElementById('wz-name')?.focus();   return; }
  if (!p.titles) { showToast('Add at least one target title.');       document.getElementById('wz-titles')?.focus(); return; }
  const wasEditing = hasProfile();
  saveProfile(p);
  closeSetupWizard();
  if (wasEditing) { render(state.tab || 'board'); showToast('Profile updated ✓'); }
  else { initApp(); }
}

init();

// ── ANALYZE JD ───────────────────────────────────────────────────────────────
// The fit-scoring system prompt is built from the user's profile at call time
// via buildAnalyzeSystem() — see the USER PROFILE section near the top.

let analyzeState = { open: false, loading: false, input: '', result: null, error: null };


function openAnalyzeModal() {
  analyzeState = { open: true, loading: false, input: '', result: null, error: null };
  renderAnalyzeModal();
}

function openAnalyzeModalWithText(text) {
  analyzeState = { open: true, loading: false, input: text || '', result: null, error: null };
  renderAnalyzeModal();
  if (text && text.trim()) {
    // auto-kick off analysis if text was already provided
    runAnalyze();
  }
}

function closeAnalyzeModal() {
  analyzeState.open = false;
  const m = document.getElementById('analyze-modal');
  if (m) m.remove();
}

function renderAnalyzeModal() {
  let m = document.getElementById('analyze-modal');
  if (!m) {
    m = document.createElement('div');
    m.id = 'analyze-modal';
    m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px';
    document.body.appendChild(m);
  }

  const res = analyzeState.result;

  m.innerHTML = `
    <div style="background:var(--surf);border:1px solid var(--brd2);border-radius:12px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;padding:24px;position:relative">
      <button onclick="closeAnalyzeModal()" style="position:absolute;top:12px;right:12px;font-size:16px;background:none;border:none;color:var(--muted);cursor:pointer">✕</button>
      <div style="font-size:16px;font-weight:600;color:var(--tx);margin-bottom:4px">🔍 Analyze Job Description</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:16px">Paste JD text or a URL — Claude will extract, score, and flag it in one shot.</div>

      ${!res ? `
        <div style="margin-bottom:12px">
          <textarea id="jd-input" placeholder="Paste job description text here, or paste a URL to fetch it…"
            style="width:100%;height:160px;font-size:12px;padding:10px;border:1px solid var(--brd2);border-radius:6px;background:var(--surf2);color:var(--tx);resize:vertical;box-sizing:border-box"
            oninput="analyzeState.input=this.value">${esc(analyzeState.input)}</textarea>
        </div>
        <div style="display:flex;gap:8px">
          <button class="amber" onclick="runAnalyze()" ${analyzeState.loading?'disabled':''} style="flex:1;padding:9px 0;font-size:13px">
            ${analyzeState.loading ? '<span class="spin"></span> Analyzing…' : '⚡ Analyze'}
          </button>
          <button onclick="closeAnalyzeModal()" style="font-size:12px">Cancel</button>
        </div>
        ${analyzeState.error ? `<div style="margin-top:10px;font-size:12px;color:var(--red)">${esc(analyzeState.error)}</div>` : ''}
      ` : `
        ${renderAnalyzeResult(res)}
        <div style="display:flex;gap:8px;margin-top:16px">
          ${isGuest() ? '' : `<button class="amber" onclick="saveAnalyzedCard()" style="flex:1;padding:9px 0;font-size:13px">💾 Save to Tracker</button>`}
          <button onclick="analyzeState.result=null;analyzeState.input='';renderAnalyzeModal()" style="font-size:12px">← Analyze another</button>
          <button onclick="closeAnalyzeModal()" style="font-size:12px">Close</button>
        </div>
        ${isGuest() ? `<div style="font-size:11px;color:var(--faint);margin-top:8px;text-align:center;letter-spacing:.03em">Sign in as owner to save results to the tracker.</div>` : ''}
      `}
    </div>`;
}

function renderAnalyzeResult(r) {
  const fitColor = r.fitScore >= 7 ? 'var(--green)' : r.fitScore >= 5 ? 'var(--amber)' : 'var(--red)';
  const clarityColor = r.roleClarity >= 7 ? 'var(--green)' : r.roleClarity >= 5 ? 'var(--amber)' : 'var(--red)';

  const flags = (r.redFlags||[]).map(f =>
    `<div style="font-size:11px;padding:3px 8px;border-radius:4px;background:var(--red-bg);border:1px solid var(--rose-border);color:var(--red)">⚑ ${esc(f)}</div>`
  ).join('');

  return `
    <div style="margin-bottom:14px">
      <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap">
        <div style="flex:1;min-width:120px;background:var(--surf2);border-radius:8px;padding:10px 14px;text-align:center">
          <div style="font-size:22px;font-weight:700;color:${fitColor}">${r.fitScore}<span style="font-size:13px;color:var(--muted)">/10</span></div>
          <div style="font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em">Fit Score</div>
        </div>
        <div style="flex:1;min-width:120px;background:var(--surf2);border-radius:8px;padding:10px 14px;text-align:center">
          <div style="font-size:22px;font-weight:700;color:${clarityColor}">${r.roleClarity}<span style="font-size:13px;color:var(--muted)">/10</span></div>
          <div style="font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em">Role Clarity</div>
        </div>
        <div style="flex:2;min-width:200px;background:var(--surf2);border-radius:8px;padding:10px 14px">
          <div style="font-size:13px;font-weight:600;color:var(--tx)">${esc(r.company||'—')}</div>
          <div style="font-size:12px;color:var(--muted)">${esc(r.role||'—')}</div>
          <div style="font-size:11px;color:var(--faint);margin-top:2px">${esc(r.salary||'Comp not listed')} · ${esc(r.location||'Location unknown')}</div>
        </div>
      </div>

      ${flags ? `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">${flags}</div>` : ''}

      <div style="font-size:11px;margin-bottom:6px">
        <span style="color:var(--muted);font-weight:500">Match criteria: </span>
        <span style="color:var(--faint)">${esc(r.matchCriteria||'—')}</span>
      </div>
      <div style="font-size:11px;margin-bottom:6px">
        <span style="color:var(--muted);font-weight:500">Fit rationale: </span>
        <span style="color:var(--faint)">${esc(r.fitRationale||'—')}</span>
      </div>
      ${r.compAnalysis ? `
      <div style="font-size:11px;margin-bottom:6px">
        <span style="color:var(--muted);font-weight:500">Comp check: </span>
        <span style="color:var(--faint)">${esc(r.compAnalysis)}</span>
      </div>` : ''}
      ${r.newsSnapshot ? `
      <div style="font-size:11px;background:var(--surf2);border-radius:6px;padding:8px 10px;margin-top:8px">
        <div style="color:var(--muted);font-weight:500;margin-bottom:4px">📰 Company news</div>
        <div style="color:var(--faint);line-height:1.6">${esc(r.newsSnapshot)}</div>
      </div>` : ''}
    </div>`;
}

async function runAnalyze() {
  const input = (document.getElementById('jd-input')?.value || '').trim();
  if (!input) return;
  analyzeState.loading = true;
  analyzeState.error = null;
  analyzeState.input = input;
  renderAnalyzeModal();

  const userPrompt = `Analyze this job posting and return ONLY a valid JSON object (no markdown, no preamble) with these exact keys:
{
  "company": "company name",
  "role": "job title",
  "reqNum": "job requisition / req number if present in the posting (e.g. R00288690, JR-12345), or empty string",
  "salary": "salary range or empty string",
  "location": "location or Remote",
  "matchCriteria": "3-6 key requirements from the JD in brief format, semicolon separated",
  "fitScore": <number 1-10>,
  "fitRationale": "2-3 sentence explanation of the fit score against the candidate profile",
  "roleClarity": <number 1-10 — how well-written and specific is this JD>,
  "redFlags": ["flag 1", "flag 2"],
  "compAnalysis": "1-2 sentences on whether comp is above/below/at market for this role, level, and location",
  "newsSnapshot": "2-3 sentences: recent company news — funding, product launches, leadership changes, or layoffs. Use web search."
}

Job posting input:
${input}`;

  try {
    const bodyPayload = {
      model: CLAUDE_MODEL,
      max_tokens: 1000,
      system: buildAnalyzeSystem(),
      messages: [{ role: 'user', content: userPrompt }],
      // The proxy supports server-side web search for live company news.
      tools: [{ type: 'web_search_20250305', name: 'web_search' }]
    };
    const resp = await fetch(CLAUDE_URL, {
      method: 'POST',
      headers: claudeHeaders(),
      body: JSON.stringify(bodyPayload)
    });
    if (!resp.ok) {
      let errMsg = `API error ${resp.status}`;
      try {
        const errData = await resp.json();
        errMsg = errData?.error?.message || errMsg;
      } catch(e2) {
        const rawText = await resp.text().catch(()=>'');
        if (rawText.includes('<html')) errMsg = 'The /api/claude proxy isn\u2019t responding — is your Cloudflare deployment live with ANTHROPIC_API_KEY set?';
        else errMsg += ': ' + rawText.slice(0, 120);
      }
      throw new Error(errMsg);
    }
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    const text = (data.content||[]).filter(b => b.type==='text').map(b=>b.text).join('').trim();
    // Strip markdown fences if present
    const clean = text.replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
    const result = JSON.parse(clean);
    analyzeState.result = result;
    analyzeState.loading = false;
  } catch(e) {
    analyzeState.error = 'Analysis failed: ' + e.message;
    analyzeState.loading = false;
  }
  renderAnalyzeModal();
}

function saveAnalyzedCard() {
  const r = analyzeState.result;
  if (!r) return;
  const notes = [r.newsSnapshot, r.compAnalysis].filter(Boolean).join(' | ');
  const now = new Date().toISOString();
  state.apps.push({
    id: Date.now(),
    company:    r.company || '',
    role:       r.role || '',
    reqNum:     r.reqNum || '',
    salary:     r.salary || '',
    location:   r.location || '',
    fit:        r.fitScore ? String(r.fitScore) : '',
    fitSource:  r.fitScore ? 'claude' : '',
    keyReqs:    r.matchCriteria || '',
    gaps:       notes,
    stage:      'Saved',
    priority:   r.fitScore >= 8 ? 'High' : r.fitScore >= 6 ? 'Medium' : 'Low',
    date:       now.slice(0,10),
    savedAt:    now.slice(0,10),
    actLog:     [{date: now.slice(0,10), note: 'Saved from JD Analyzer'}],
    updatedAt:  now,
  });
  save();
  closeAnalyzeModal();
  render('tracker');
  showToast('Card saved to tracker ✓');
}
